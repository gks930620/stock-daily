<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="400" fill="#f8fafc"/>
  <text x="390" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">멱등성(Idempotent)이란?</text>
  <text x="390" y="58" text-anchor="middle" font-size="13" fill="#64748b">같은 요청을 여러 번 보내도 서버의 최종 상태가 같으면 "멱등"</text>

  <!-- DELETE (idempotent) -->
  <rect x="30" y="80" width="720" height="130" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="55" y="108" font-size="15" font-weight="700" fill="#15803d">⭕ DELETE /users/1 — 멱등</text>

  <rect x="70" y="125" width="130" height="40" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="135" y="150" text-anchor="middle" font-size="12" fill="#166534">1번째 → 삭제됨</text>
  <rect x="250" y="125" width="130" height="40" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="315" y="150" text-anchor="middle" font-size="12" fill="#166534">2번째 → 이미 없음</text>
  <rect x="430" y="125" width="130" height="40" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="495" y="150" text-anchor="middle" font-size="12" fill="#166534">3번째 → 이미 없음</text>
  <path d="M202 145 L248 145" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <path d="M382 145 L428 145" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <rect x="590" y="120" width="140" height="50" rx="8" fill="#166534"/>
  <text x="660" y="142" text-anchor="middle" font-size="12" fill="#fff">최종 상태</text>
  <text x="660" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#bbf7d0">항상 "없음"</text>
  <text x="55" y="195" font-size="11" fill="#15803d">몇 번을 보내든 "1번 유저는 없다"는 상태로 동일 → 안전하게 재시도 가능</text>

  <!-- POST (not idempotent) -->
  <rect x="30" y="225" width="720" height="130" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="55" y="253" font-size="15" font-weight="700" fill="#b91c1c">❌ POST /users — 멱등 아님</text>

  <rect x="70" y="270" width="130" height="40" rx="6" fill="#fee2e2" stroke="#ef4444"/>
  <text x="135" y="295" text-anchor="middle" font-size="12" fill="#991b1b">1번째 → 유저 A 생성</text>
  <rect x="250" y="270" width="130" height="40" rx="6" fill="#fee2e2" stroke="#ef4444"/>
  <text x="315" y="295" text-anchor="middle" font-size="12" fill="#991b1b">2번째 → 유저 B 생성</text>
  <rect x="430" y="270" width="130" height="40" rx="6" fill="#fee2e2" stroke="#ef4444"/>
  <text x="495" y="295" text-anchor="middle" font-size="12" fill="#991b1b">3번째 → 유저 C 생성</text>
  <path d="M202 290 L248 290" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <path d="M382 290 L428 290" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <rect x="590" y="265" width="140" height="50" rx="8" fill="#991b1b"/>
  <text x="660" y="287" text-anchor="middle" font-size="12" fill="#fff">최종 상태</text>
  <text x="660" y="305" text-anchor="middle" font-size="12" font-weight="700" fill="#fecaca">3명 생성됨!</text>
  <text x="55" y="340" font-size="11" fill="#b91c1c">보낼 때마다 새 유저가 생김 → 중복 요청 시 문제 (재시도에 주의)</text>

  <defs>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#16a34a"/></marker>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#ef4444"/></marker>
  </defs>
</svg>
