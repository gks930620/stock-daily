<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="400" fill="#f8fafc"/>
  <text x="390" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">PUT(전체 교체) vs PATCH(부분 수정)</text>

  <!-- original -->
  <text x="390" y="70" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">원본 리소스  /users/1</text>
  <rect x="300" y="80" width="180" height="90" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="390" y="106" text-anchor="middle" font-size="12" font-family="monospace" fill="#334155">name: "한창희"</text>
  <text x="390" y="128" text-anchor="middle" font-size="12" font-family="monospace" fill="#334155">email: "a@x.com"</text>
  <text x="390" y="150" text-anchor="middle" font-size="12" font-family="monospace" fill="#334155">age: 30</text>

  <!-- PUT -->
  <rect x="30" y="200" width="345" height="170" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="202" y="228" text-anchor="middle" font-size="15" font-weight="700" fill="#c2410c">PUT — 전체 교체</text>
  <text x="202" y="252" text-anchor="middle" font-size="11" font-family="monospace" fill="#9a3412">PUT { name:"김", email:"b@x.com" }</text>

  <rect x="80" y="268" width="185" height="88" rx="8" fill="#ffedd5" stroke="#fb923c"/>
  <text x="172" y="292" text-anchor="middle" font-size="12" font-family="monospace" fill="#9a3412">name: "김"</text>
  <text x="172" y="313" text-anchor="middle" font-size="12" font-family="monospace" fill="#9a3412">email: "b@x.com"</text>
  <text x="172" y="334" text-anchor="middle" font-size="12" font-family="monospace" fill="#dc2626">age: 사라짐 ⚠</text>
  <text x="202" y="368" text-anchor="middle" font-size="10" fill="#b45309">보낸 것으로 통째로 덮어씀 (빠진 필드는 없어짐)</text>

  <!-- PATCH -->
  <rect x="405" y="200" width="345" height="170" rx="12" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="577" y="228" text-anchor="middle" font-size="15" font-weight="700" fill="#7e22ce">PATCH — 부분 수정</text>
  <text x="577" y="252" text-anchor="middle" font-size="11" font-family="monospace" fill="#6b21a8">PATCH { name:"김" }</text>

  <rect x="455" y="268" width="185" height="88" rx="8" fill="#f3e8ff" stroke="#c084fc"/>
  <text x="547" y="292" text-anchor="middle" font-size="12" font-family="monospace" fill="#6b21a8">name: "김"</text>
  <text x="547" y="313" text-anchor="middle" font-size="12" font-family="monospace" fill="#15803d">email: 그대로 유지</text>
  <text x="547" y="334" text-anchor="middle" font-size="12" font-family="monospace" fill="#15803d">age: 그대로 유지</text>
  <text x="577" y="368" text-anchor="middle" font-size="10" fill="#7e22ce">보낸 필드만 바꾸고 나머지는 유지</text>

  <path d="M340 172 C 250 185, 210 190, 202 198" stroke="#f97316" stroke-width="2" fill="none" marker-end="url(#ao)"/>
  <path d="M440 172 C 540 185, 570 190, 577 198" stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#ap)"/>

  <defs>
    <marker id="ao" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#f97316"/></marker>
    <marker id="ap" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#a855f7"/></marker>
  </defs>
</svg>
