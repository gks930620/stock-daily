<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="420" fill="#f8fafc"/>
  <text x="390" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">동기화 문제 (Race Condition)</text>
  <text x="390" y="58" text-anchor="middle" font-size="13" fill="#64748b">두 스레드가 공유 변수를 동시에 읽고 쓰면 값이 꼬인다</text>

  <!-- shared var -->
  <rect x="300" y="78" width="180" height="42" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="390" y="104" text-anchor="middle" font-size="14" font-weight="700" fill="#c2410c">공유 변수 count = 0</text>

  <!-- time axis -->
  <text x="40" y="150" font-size="12" font-weight="700" fill="#334155">시간 ↓</text>

  <!-- Thread A column -->
  <rect x="70" y="160" width="300" height="180" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="220" y="185" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">Thread A</text>
  <rect x="95" y="200" width="250" height="34" rx="6" fill="#dbeafe"/>
  <text x="220" y="222" text-anchor="middle" font-size="12" fill="#1e3a8a">read(count) → 0 을 읽음</text>
  <rect x="95" y="248" width="250" height="34" rx="6" fill="#dbeafe"/>
  <text x="220" y="270" text-anchor="middle" font-size="12" fill="#1e3a8a">0 + 1 = 1 계산</text>
  <rect x="95" y="296" width="250" height="34" rx="6" fill="#dbeafe"/>
  <text x="220" y="318" text-anchor="middle" font-size="12" fill="#1e3a8a">write(count = 1)</text>

  <!-- Thread B column -->
  <rect x="410" y="160" width="300" height="180" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="560" y="185" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">Thread B</text>
  <rect x="435" y="200" width="250" height="34" rx="6" fill="#dcfce7"/>
  <text x="560" y="222" text-anchor="middle" font-size="12" fill="#166534">read(count) → 0 을 읽음</text>
  <rect x="435" y="248" width="250" height="34" rx="6" fill="#dcfce7"/>
  <text x="560" y="270" text-anchor="middle" font-size="12" fill="#166534">0 + 1 = 1 계산</text>
  <rect x="435" y="296" width="250" height="34" rx="6" fill="#dcfce7"/>
  <text x="560" y="318" text-anchor="middle" font-size="12" fill="#166534">write(count = 1)</text>

  <!-- problem: both read 0 -->
  <path d="M345 217 L433 217" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 3" fill="none"/>
  <text x="390" y="212" text-anchor="middle" font-size="10" fill="#b91c1c">둘 다 0을 읽음!</text>

  <!-- result -->
  <rect x="150" y="360" width="220" height="46" rx="10" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="260" y="382" text-anchor="middle" font-size="13" fill="#166534">기대값</text>
  <text x="260" y="400" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">count = 2</text>

  <rect x="410" y="360" width="220" height="46" rx="10" fill="#fef2f2" stroke="#ef4444"/>
  <text x="520" y="382" text-anchor="middle" font-size="13" fill="#b91c1c">실제값 (문제!)</text>
  <text x="520" y="400" text-anchor="middle" font-size="15" font-weight="700" fill="#b91c1c">count = 1</text>

  <text x="390" y="352" text-anchor="middle" font-size="11" fill="#64748b">→ mutex · semaphore · lock-free 등으로 해결</text>
</svg>
