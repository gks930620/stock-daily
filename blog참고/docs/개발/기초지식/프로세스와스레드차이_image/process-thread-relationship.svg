<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 430" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="430" fill="#f8fafc"/>
  <text x="390" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">프로세스와 스레드의 자원 관계</text>
  <text x="390" y="58" text-anchor="middle" font-size="13" fill="#64748b">같은 프로세스의 스레드는 자원을 공유하되, 실행 상태는 각자 가진다</text>

  <!-- Process box -->
  <rect x="40" y="80" width="700" height="320" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="65" y="108" font-size="16" font-weight="700" fill="#1d4ed8">Process</text>

  <!-- Shared area -->
  <rect x="65" y="125" width="650" height="80" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="390" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#c2410c">공유 자원 (모든 스레드가 함께 사용)</text>
  <text x="390" y="180" text-anchor="middle" font-size="13" fill="#9a3412">Code · Data · Heap · 열린 파일 등</text>

  <!-- Thread A -->
  <rect x="90" y="235" width="270" height="140" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="225" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">Thread A</text>
  <text x="225" y="288" text-anchor="middle" font-size="12" fill="#475569">— 개별 소유 —</text>
  <text x="225" y="312" text-anchor="middle" font-size="12" fill="#166534">Register (레지스터)</text>
  <text x="225" y="334" text-anchor="middle" font-size="12" fill="#166534">PC (Program Counter)</text>
  <text x="225" y="356" text-anchor="middle" font-size="12" fill="#166534">Stack (개별 스택)</text>

  <!-- Thread B -->
  <rect x="420" y="235" width="270" height="140" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="555" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">Thread B</text>
  <text x="555" y="288" text-anchor="middle" font-size="12" fill="#475569">— 개별 소유 —</text>
  <text x="555" y="312" text-anchor="middle" font-size="12" fill="#166534">Register (레지스터)</text>
  <text x="555" y="334" text-anchor="middle" font-size="12" fill="#166534">PC (Program Counter)</text>
  <text x="555" y="356" text-anchor="middle" font-size="12" fill="#166534">Stack (개별 스택)</text>

  <!-- arrows to shared -->
  <path d="M225 233 L225 207" stroke="#f97316" stroke-width="2" fill="none" marker-end="url(#ao)"/>
  <path d="M555 233 L555 207" stroke="#f97316" stroke-width="2" fill="none" marker-end="url(#ao)"/>
  <text x="390" y="228" text-anchor="middle" font-size="11" fill="#c2410c">↑ 공유 자원에 함께 접근</text>

  <defs>
    <marker id="ao" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#f97316"/></marker>
  </defs>
</svg>
