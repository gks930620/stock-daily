<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 380" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="380" fill="#f8fafc"/>
  <text x="390" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">경험은 STAR 틀로 말하기</text>
  <text x="390" y="58" text-anchor="middle" font-size="13" fill="#64748b">"어떤 문제를 어떻게 해결했는지"를 네 단계로 풀면 설득력이 생긴다</text>

  <!-- S -->
  <rect x="30" y="90" width="170" height="200" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="115" cy="125" r="22" fill="#3b82f6"/>
  <text x="115" y="133" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">S</text>
  <text x="115" y="168" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">Situation</text>
  <text x="115" y="188" text-anchor="middle" font-size="12" fill="#475569">상황</text>
  <text x="115" y="220" text-anchor="middle" font-size="11" fill="#64748b">어떤 배경이었나</text>
  <text x="115" y="245" text-anchor="middle" font-size="10" fill="#94a3b8">"트래픽이 몰리는</text>
  <text x="115" y="260" text-anchor="middle" font-size="10" fill="#94a3b8">주문 API에서…"</text>

  <!-- T -->
  <rect x="215" y="90" width="170" height="200" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <circle cx="300" cy="125" r="22" fill="#22c55e"/>
  <text x="300" y="133" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">T</text>
  <text x="300" y="168" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">Task</text>
  <text x="300" y="188" text-anchor="middle" font-size="12" fill="#475569">과제</text>
  <text x="300" y="220" text-anchor="middle" font-size="11" fill="#64748b">무엇을 해결해야</text>
  <text x="300" y="235" text-anchor="middle" font-size="11" fill="#64748b">했나</text>
  <text x="300" y="262" text-anchor="middle" font-size="10" fill="#94a3b8">"응답 지연을 줄여야"</text>

  <!-- A -->
  <rect x="400" y="90" width="170" height="200" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <circle cx="485" cy="125" r="22" fill="#f97316"/>
  <text x="485" y="133" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">A</text>
  <text x="485" y="168" text-anchor="middle" font-size="14" font-weight="700" fill="#c2410c">Action</text>
  <text x="485" y="188" text-anchor="middle" font-size="12" fill="#475569">행동</text>
  <text x="485" y="220" text-anchor="middle" font-size="11" fill="#64748b">내가 무엇을</text>
  <text x="485" y="235" text-anchor="middle" font-size="11" fill="#64748b">어떻게 했나</text>
  <text x="485" y="262" text-anchor="middle" font-size="10" fill="#94a3b8">"캐시·비동기 도입"</text>

  <!-- R -->
  <rect x="585" y="90" width="170" height="200" rx="12" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <circle cx="670" cy="125" r="22" fill="#a855f7"/>
  <text x="670" y="133" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">R</text>
  <text x="670" y="168" text-anchor="middle" font-size="14" font-weight="700" fill="#7e22ce">Result</text>
  <text x="670" y="188" text-anchor="middle" font-size="12" fill="#475569">결과</text>
  <text x="670" y="220" text-anchor="middle" font-size="11" fill="#64748b">어떤 성과가</text>
  <text x="670" y="235" text-anchor="middle" font-size="11" fill="#64748b">있었나 (수치)</text>
  <text x="670" y="262" text-anchor="middle" font-size="10" fill="#94a3b8">"응답 1.2s → 0.3s"</text>

  <path d="M202 190 L213 190" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
  <path d="M387 190 L398 190" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
  <path d="M572 190 L583 190" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#a)"/>

  <text x="390" y="335" text-anchor="middle" font-size="13" fill="#64748b">여러 프로젝트를 얕게 나열하기보다, 하나라도 이 흐름으로 깊이 있게 말하는 게 낫다</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#64748b"/></marker>
  </defs>
</svg>
