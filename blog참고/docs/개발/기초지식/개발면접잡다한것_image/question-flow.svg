<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 440" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="440" fill="#f8fafc"/>
  <text x="390" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">면접 질문은 어디서 나오는가</text>
  <text x="390" y="58" text-anchor="middle" font-size="13" fill="#64748b">면접관은 "코드 한 줄"이 아니라 "내가 말한 것"을 파고든다</text>

  <!-- 내가 준비 -->
  <text x="180" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">내가 내미는 것</text>
  <rect x="55" y="110" width="250" height="70" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="180" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">이력서 / 지원서</text>
  <text x="180" y="160" text-anchor="middle" font-size="11" fill="#475569">어떤 기술 · 어떻게 적용 · 무슨 문제 해결</text>

  <rect x="55" y="195" width="250" height="70" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="180" y="223" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">아키텍처 / 시스템 설명</text>
  <text x="180" y="245" text-anchor="middle" font-size="11" fill="#475569">서버 구성 · DB 분리 · 메시지 큐 등</text>

  <!-- 면접관 질문 -->
  <rect x="440" y="110" width="285" height="155" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="582" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#c2410c">면접관의 후속 질문</text>
  <text x="582" y="165" text-anchor="middle" font-size="12" fill="#9a3412">"왜 그 기술을 선택했나요?"</text>
  <text x="582" y="188" text-anchor="middle" font-size="12" fill="#9a3412">"그때 어떤 문제가 있었죠?"</text>
  <text x="582" y="211" text-anchor="middle" font-size="12" fill="#9a3412">"다른 방법은 없었나요?"</text>
  <text x="582" y="234" text-anchor="middle" font-size="12" fill="#9a3412">"서버는 왜 그렇게 나눴나요?"</text>

  <path d="M308 145 C 380 145, 380 175, 438 175" stroke="#f97316" stroke-width="2.5" fill="none" marker-end="url(#ao)"/>
  <path d="M308 230 C 380 230, 380 200, 438 200" stroke="#f97316" stroke-width="2.5" fill="none" marker-end="url(#ao)"/>
  <text x="373" y="130" text-anchor="middle" font-size="11" fill="#c2410c">여기서 파생</text>

  <!-- O / X -->
  <rect x="55" y="300" width="330" height="50" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="220" y="331" text-anchor="middle" font-size="13" fill="#166534">⭕ 실제 했던 작업 기반으로 물어본다</text>

  <rect x="410" y="300" width="315" height="50" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="567" y="331" text-anchor="middle" font-size="13" fill="#b91c1c">❌ 단순 코드 레벨은 잘 안 물어본다</text>

  <!-- conclusion -->
  <rect x="55" y="375" width="670" height="46" rx="10" fill="#1e293b"/>
  <text x="390" y="403" text-anchor="middle" font-size="13" font-weight="700" fill="#fde68a">그래서 — 내가 이력서·설명에 쓴 것은 무엇이든 깊이 답할 수 있어야 한다</text>

  <defs>
    <marker id="ao" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#f97316"/></marker>
  </defs>
</svg>
