<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="400" fill="#f8fafc"/>
  <text x="390" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">System.out.println vs 로깅 프레임워크</text>

  <!-- sysout -->
  <rect x="30" y="60" width="345" height="310" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="202" y="88" text-anchor="middle" font-size="15" font-weight="700" fill="#b91c1c">❌ System.out.println</text>

  <rect x="120" y="105" width="160" height="34" rx="6" fill="#fee2e2" stroke="#ef4444"/>
  <text x="200" y="127" text-anchor="middle" font-size="11" fill="#991b1b">스레드 1 · 2 · 3 ···</text>
  <path d="M200 141 L200 165" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#ar)"/>

  <rect x="90" y="168" width="225" height="52" rx="8" fill="#991b1b"/>
  <text x="202" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="#fecaca">synchronized + flush</text>
  <text x="202" y="209" text-anchor="middle" font-size="10" fill="#fca5a5">한 번에 하나씩 → 줄서서 대기</text>

  <path d="M200 222 L200 244" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <rect x="120" y="247" width="160" height="34" rx="6" fill="#fff" stroke="#ef4444"/>
  <text x="200" y="269" text-anchor="middle" font-size="11" fill="#991b1b">콘솔 (Blocking I/O)</text>

  <text x="202" y="308" text-anchor="middle" font-size="11" fill="#b91c1c">• 출력마다 blocking → 성능 저하</text>
  <text x="202" y="328" text-anchor="middle" font-size="11" fill="#b91c1c">• 로그 레벨 · 포맷 · 파일 관리 X</text>
  <text x="202" y="348" text-anchor="middle" font-size="11" fill="#b91c1c">• 운영/개발 구분 불가</text>

  <!-- logging -->
  <rect x="405" y="60" width="345" height="310" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="577" y="88" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">⭕ SLF4J + Logback / Log4j2</text>

  <rect x="495" y="105" width="160" height="34" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="575" y="127" text-anchor="middle" font-size="11" fill="#166534">log.info(...) / log.debug(...)</text>
  <path d="M575 141 L575 165" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#ag)"/>

  <rect x="465" y="168" width="225" height="52" rx="8" fill="#166534"/>
  <text x="577" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="#bbf7d0">비동기 Appender 가능</text>
  <text x="577" y="209" text-anchor="middle" font-size="10" fill="#86efac">별도 스레드가 모아서 기록</text>

  <path d="M577 222 L577 244" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <rect x="465" y="247" width="225" height="34" rx="6" fill="#fff" stroke="#22c55e"/>
  <text x="577" y="269" text-anchor="middle" font-size="11" fill="#166534">파일 / 콘솔 / 원격 (rolling)</text>

  <text x="577" y="308" text-anchor="middle" font-size="11" fill="#15803d">• 레벨 제어 (DEBUG/INFO/WARN/ERROR)</text>
  <text x="577" y="328" text-anchor="middle" font-size="11" fill="#15803d">• 포맷·시간·파일 분리 관리</text>
  <text x="577" y="348" text-anchor="middle" font-size="11" fill="#15803d">• 환경별(운영/개발) 설정 분리</text>

  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#ef4444"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#22c55e"/></marker>
  </defs>
</svg>
