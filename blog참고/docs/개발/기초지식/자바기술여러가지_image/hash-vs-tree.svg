<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="420" fill="#f8fafc"/>
  <text x="390" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Hash 계열 vs Tree 계열 (내부 구조)</text>

  <!-- HashMap -->
  <rect x="30" y="60" width="360" height="330" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="210" y="88" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">HashMap / HashSet</text>
  <text x="210" y="110" text-anchor="middle" font-size="12" fill="#78350f">해시 함수로 버킷에 저장</text>

  <rect x="70" y="128" width="130" height="34" rx="6" fill="#fff" stroke="#f59e0b"/>
  <text x="135" y="150" text-anchor="middle" font-size="12" font-family="monospace" fill="#92400e">key "apple"</text>
  <path d="M200 145 L245 145" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#af)"/>
  <rect x="248" y="128" width="90" height="34" rx="6" fill="#fde68a" stroke="#f59e0b"/>
  <text x="293" y="150" text-anchor="middle" font-size="11" fill="#78350f">hash( )</text>

  <!-- buckets -->
  <text x="210" y="188" text-anchor="middle" font-size="11" fill="#78350f">버킷 배열 (순서 없음)</text>
  <g>
    <rect x="60" y="200" width="52" height="40" fill="#fff" stroke="#f59e0b"/>
    <text x="86" y="225" text-anchor="middle" font-size="11" fill="#92400e">[0]</text>
    <rect x="118" y="200" width="52" height="40" fill="#fde68a" stroke="#f59e0b"/>
    <text x="144" y="225" text-anchor="middle" font-size="11" fill="#92400e">[1]</text>
    <rect x="176" y="200" width="52" height="40" fill="#fff" stroke="#f59e0b"/>
    <text x="202" y="225" text-anchor="middle" font-size="11" fill="#92400e">[2]</text>
    <rect x="234" y="200" width="52" height="40" fill="#fde68a" stroke="#f59e0b"/>
    <text x="260" y="225" text-anchor="middle" font-size="11" fill="#92400e">[3]</text>
    <rect x="292" y="200" width="52" height="40" fill="#fff" stroke="#f59e0b"/>
    <text x="318" y="225" text-anchor="middle" font-size="11" fill="#92400e">[4]</text>
  </g>

  <rect x="60" y="265" width="285" height="105" rx="8" fill="#fffbeb"/>
  <text x="202" y="290" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">평균 조회 O(1) — 매우 빠름</text>
  <text x="202" y="314" text-anchor="middle" font-size="11" fill="#78350f">저장 순서 보장 X</text>
  <text x="202" y="334" text-anchor="middle" font-size="11" fill="#78350f">충돌 시 체이닝 → 많아지면 트리로 전환</text>
  <text x="202" y="354" text-anchor="middle" font-size="11" fill="#78350f">(Java 8+, 버킷당 8개 초과 시)</text>

  <!-- TreeMap -->
  <rect x="410" y="60" width="340" height="330" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="580" y="88" text-anchor="middle" font-size="16" font-weight="700" fill="#15803d">TreeMap / TreeSet</text>
  <text x="580" y="110" text-anchor="middle" font-size="12" fill="#166534">Red-Black Tree (정렬된 이진트리)</text>

  <!-- tree -->
  <circle cx="580" cy="150" r="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="580" y="155" text-anchor="middle" font-size="12" fill="#166534">30</text>
  <circle cx="510" cy="205" r="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="510" y="210" text-anchor="middle" font-size="12" fill="#166534">15</text>
  <circle cx="650" cy="205" r="20" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="650" y="210" text-anchor="middle" font-size="12" fill="#166534">50</text>
  <circle cx="470" cy="258" r="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="470" y="263" text-anchor="middle" font-size="11" fill="#166534">8</text>
  <circle cx="690" cy="258" r="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="690" y="263" text-anchor="middle" font-size="11" fill="#166534">70</text>
  <path d="M566 165 L524 191" stroke="#16a34a" stroke-width="2"/>
  <path d="M594 165 L636 191" stroke="#16a34a" stroke-width="2"/>
  <path d="M497 218 L481 243" stroke="#16a34a" stroke-width="2"/>
  <path d="M663 218 L679 243" stroke="#16a34a" stroke-width="2"/>

  <rect x="435" y="295" width="290" height="80" rx="8" fill="#f0fdf9"/>
  <text x="580" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">조회 O(log n) — Hash보다 느림</text>
  <text x="580" y="344" text-anchor="middle" font-size="11" fill="#166534">항상 키가 정렬된 상태로 유지됨</text>
  <text x="580" y="364" text-anchor="middle" font-size="11" fill="#166534">범위 검색·정렬 출력이 필요할 때 유리</text>

  <defs>
    <marker id="af" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#f59e0b"/></marker>
  </defs>
</svg>
