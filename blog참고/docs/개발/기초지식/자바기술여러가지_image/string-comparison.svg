<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">String vs StringBuilder vs StringBuffer</text>

  <!-- headers -->
  <rect x="30" y="70" width="150" height="44" fill="#1e293b"/>
  <text x="105" y="97" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">구분</text>
  <rect x="180" y="70" width="200" height="44" fill="#3b82f6"/>
  <text x="280" y="97" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">String</text>
  <rect x="380" y="70" width="200" height="44" fill="#22c55e"/>
  <text x="480" y="97" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">StringBuilder</text>
  <rect x="580" y="70" width="190" height="44" fill="#f97316"/>
  <text x="675" y="97" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">StringBuffer</text>

  <!-- row: 가변성 -->
  <rect x="30" y="114" width="150" height="56" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="105" y="147" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">가변성</text>
  <rect x="180" y="114" width="200" height="56" fill="#eff6ff" stroke="#cbd5e1"/>
  <text x="280" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">불변 (immutable)</text>
  <text x="280" y="159" text-anchor="middle" font-size="10" fill="#64748b">바꾸면 새 객체 생성</text>
  <rect x="380" y="114" width="200" height="56" fill="#f0fdf4" stroke="#cbd5e1"/>
  <text x="480" y="147" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">가변 (mutable)</text>
  <rect x="580" y="114" width="190" height="56" fill="#fff7ed" stroke="#cbd5e1"/>
  <text x="675" y="147" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">가변 (mutable)</text>

  <!-- row: Thread-safe -->
  <rect x="30" y="170" width="150" height="56" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="105" y="203" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Thread-safe</text>
  <rect x="180" y="170" width="200" height="56" fill="#fff" stroke="#cbd5e1"/>
  <text x="280" y="197" text-anchor="middle" font-size="12" fill="#16a34a">⭕ (불변이라 안전)</text>
  <text x="280" y="216" text-anchor="middle" font-size="10" fill="#94a3b8">값이 안 바뀌니까</text>
  <rect x="380" y="170" width="200" height="56" fill="#fef2f2" stroke="#cbd5e1"/>
  <text x="480" y="203" text-anchor="middle" font-size="12" fill="#dc2626">❌ 비동기</text>
  <rect x="580" y="170" width="190" height="56" fill="#f0fdf4" stroke="#cbd5e1"/>
  <text x="675" y="197" text-anchor="middle" font-size="12" fill="#16a34a">⭕ synchronized</text>
  <text x="675" y="216" text-anchor="middle" font-size="10" fill="#94a3b8">메서드에 동기화</text>

  <!-- row: 속도 -->
  <rect x="30" y="226" width="150" height="56" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="105" y="259" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">속도</text>
  <rect x="180" y="226" width="200" height="56" fill="#fff" stroke="#cbd5e1"/>
  <text x="280" y="252" text-anchor="middle" font-size="12" fill="#475569">반복 연결 시 느림</text>
  <text x="280" y="271" text-anchor="middle" font-size="10" fill="#94a3b8">매번 새 객체</text>
  <rect x="380" y="226" width="200" height="56" fill="#fff" stroke="#cbd5e1"/>
  <text x="480" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">가장 빠름</text>
  <text x="480" y="271" text-anchor="middle" font-size="10" fill="#94a3b8">동기화 오버헤드 없음</text>
  <rect x="580" y="226" width="190" height="56" fill="#fff" stroke="#cbd5e1"/>
  <text x="675" y="252" text-anchor="middle" font-size="12" fill="#475569">느림</text>
  <text x="675" y="271" text-anchor="middle" font-size="10" fill="#94a3b8">동기화 비용</text>

  <!-- row: 언제 -->
  <rect x="30" y="282" width="150" height="60" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="105" y="316" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">언제 쓰나</text>
  <rect x="180" y="282" width="200" height="60" fill="#fff" stroke="#cbd5e1"/>
  <text x="280" y="309" text-anchor="middle" font-size="11" fill="#475569">값이 잘 안 바뀌는</text>
  <text x="280" y="326" text-anchor="middle" font-size="11" fill="#475569">짧은 문자열</text>
  <rect x="180" y="282" width="0" height="0"/>
  <rect x="380" y="282" width="200" height="60" fill="#dcfce7" stroke="#cbd5e1"/>
  <text x="480" y="309" text-anchor="middle" font-size="11" fill="#166534">대부분의 문자열 조립</text>
  <text x="480" y="326" text-anchor="middle" font-size="11" fill="#166534">(단일 스레드 / 로컬 변수)</text>
  <rect x="580" y="282" width="190" height="60" fill="#fff" stroke="#cbd5e1"/>
  <text x="675" y="309" text-anchor="middle" font-size="11" fill="#475569">여러 스레드가</text>
  <text x="675" y="326" text-anchor="middle" font-size="11" fill="#475569">공유하는 경우만</text>

  <text x="400" y="372" text-anchor="middle" font-size="12" fill="#64748b">실무 기본값은 StringBuilder — 대부분 메서드 안 지역 변수라 스레드끼리 안 겹친다</text>
</svg>
