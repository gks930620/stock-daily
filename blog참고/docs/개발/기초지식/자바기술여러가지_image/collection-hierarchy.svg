<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="800" height="470" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">자바 컬렉션 계층 구조</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#64748b">Map은 Collection을 상속하지 않는 별도 계열이다</text>

  <!-- Collection -->
  <rect x="70" y="80" width="440" height="40" rx="8" fill="#1e293b"/>
  <text x="290" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Collection 인터페이스</text>

  <!-- List / Set / Queue -->
  <rect x="70" y="150" width="140" height="40" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="175" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">List</text>
  <rect x="220" y="150" width="140" height="40" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="290" y="175" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">Set</text>
  <rect x="370" y="150" width="140" height="40" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="440" y="175" text-anchor="middle" font-size="14" font-weight="700" fill="#7e22ce">Queue</text>

  <path d="M140 122 L140 148" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M290 122 L290 148" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M440 122 L440 148" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>

  <!-- List impls -->
  <text x="140" y="215" text-anchor="middle" font-size="11" fill="#64748b">순서 O · 중복 O</text>
  <rect x="65" y="225" width="150" height="34" rx="6" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="140" y="247" text-anchor="middle" font-size="12" fill="#1e3a8a">ArrayList</text>
  <rect x="65" y="265" width="150" height="34" rx="6" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="140" y="287" text-anchor="middle" font-size="12" fill="#1e3a8a">LinkedList</text>

  <!-- Set impls -->
  <text x="290" y="215" text-anchor="middle" font-size="11" fill="#64748b">순서 X · 중복 X</text>
  <rect x="215" y="225" width="150" height="34" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="290" y="247" text-anchor="middle" font-size="12" fill="#166534">HashSet</text>
  <rect x="215" y="265" width="150" height="34" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="290" y="287" text-anchor="middle" font-size="12" fill="#166534">LinkedHashSet</text>
  <rect x="215" y="305" width="150" height="34" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="290" y="327" text-anchor="middle" font-size="12" fill="#166534">TreeSet (정렬)</text>

  <!-- Queue impls -->
  <text x="440" y="215" text-anchor="middle" font-size="11" fill="#64748b">FIFO / 우선순위</text>
  <rect x="365" y="225" width="150" height="34" rx="6" fill="#f3e8ff" stroke="#c084fc"/>
  <text x="440" y="247" text-anchor="middle" font-size="12" fill="#6b21a8">ArrayDeque</text>
  <rect x="365" y="265" width="150" height="34" rx="6" fill="#f3e8ff" stroke="#c084fc"/>
  <text x="440" y="287" text-anchor="middle" font-size="12" fill="#6b21a8">PriorityQueue</text>

  <!-- Map (separate) -->
  <rect x="560" y="80" width="200" height="40" rx="8" fill="#78350f"/>
  <text x="660" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Map 인터페이스 (별도)</text>
  <text x="660" y="140" text-anchor="middle" font-size="11" fill="#64748b">key–value · key 중복 X</text>
  <rect x="585" y="150" width="150" height="34" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="172" text-anchor="middle" font-size="12" fill="#92400e">HashMap</text>
  <rect x="585" y="190" width="150" height="34" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="212" text-anchor="middle" font-size="12" fill="#92400e">LinkedHashMap</text>
  <rect x="585" y="230" width="150" height="34" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="252" text-anchor="middle" font-size="12" fill="#92400e">TreeMap (키 정렬)</text>

  <!-- dashed separator note -->
  <line x1="535" y1="75" x2="535" y2="360" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="5 4"/>

  <text x="400" y="400" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">다형성으로 선언 → 구현체만 갈아끼움</text>
  <rect x="230" y="415" width="340" height="36" rx="8" fill="#0f172a"/>
  <text x="400" y="438" text-anchor="middle" font-size="12" font-family="monospace" fill="#fde68a">List&lt;String&gt; list = new ArrayList&lt;&gt;();</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#94a3b8"/></marker>
  </defs>
</svg>
