<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 470" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="470" fill="#f8fafc"/>
  <text x="390" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">한 사이클 실행 순서 (Microtask 우선)</text>
  <text x="390" y="60" text-anchor="middle" font-size="13" fill="#64748b">Stack이 빌 때마다 아래 순서를 반복한다</text>

  <!-- Step 1 -->
  <rect x="60" y="90" width="200" height="120" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="90" cy="120" r="15" fill="#3b82f6"/>
  <text x="90" y="125" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">1</text>
  <text x="170" y="125" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">동기 코드</text>
  <text x="160" y="155" text-anchor="middle" font-size="12" fill="#475569">Call Stack의</text>
  <text x="160" y="173" text-anchor="middle" font-size="12" fill="#475569">코드를 끝까지 실행</text>
  <text x="160" y="195" text-anchor="middle" font-size="11" fill="#94a3b8">console.log 등</text>

  <!-- Step 2 -->
  <rect x="290" y="90" width="200" height="120" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <circle cx="320" cy="120" r="15" fill="#22c55e"/>
  <text x="320" y="125" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">2</text>
  <text x="405" y="125" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">Microtask</text>
  <text x="390" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">전부 비움 (모두)</text>
  <text x="390" y="175" text-anchor="middle" font-size="12" fill="#475569">Promise.then</text>
  <text x="390" y="193" text-anchor="middle" font-size="12" fill="#475569">queueMicrotask</text>

  <!-- Step 3 -->
  <rect x="520" y="90" width="200" height="120" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <circle cx="550" cy="120" r="15" fill="#a855f7"/>
  <text x="550" y="125" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">3</text>
  <text x="635" y="125" text-anchor="middle" font-size="15" font-weight="700" fill="#7e22ce">Task</text>
  <text x="620" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#7e22ce">딱 하나만 실행</text>
  <text x="620" y="175" text-anchor="middle" font-size="12" fill="#475569">setTimeout</text>
  <text x="620" y="193" text-anchor="middle" font-size="12" fill="#475569">이벤트 콜백</text>

  <!-- arrows -->
  <path d="M262 150 L288 150" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
  <path d="M492 150 L518 150" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
  <!-- loop back arrow -->
  <path d="M620 210 C 620 260, 160 260, 160 214" stroke="#ef4444" stroke-width="2.5" fill="none" stroke-dasharray="6 4" marker-end="url(#ar)"/>
  <text x="390" y="255" text-anchor="middle" font-size="12" fill="#b91c1c">다시 1번으로 반복</text>

  <!-- Example -->
  <rect x="60" y="290" width="660" height="150" rx="10" fill="#0f172a"/>
  <text x="80" y="318" font-size="13" font-family="monospace" fill="#94a3b8">console.log("1");</text>
  <text x="80" y="340" font-size="13" font-family="monospace" fill="#c4b5fd">setTimeout(() =&gt; console.log("setTimeout"), 0);  // Task</text>
  <text x="80" y="362" font-size="13" font-family="monospace" fill="#86efac">Promise.resolve().then(() =&gt; console.log("Promise")); // Microtask</text>
  <text x="80" y="384" font-size="13" font-family="monospace" fill="#94a3b8">console.log("2");</text>
  <text x="80" y="418" font-size="15" font-family="monospace" font-weight="700" fill="#fbbf24">출력: 1 → 2 → Promise → setTimeout</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#64748b"/></marker>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#ef4444"/></marker>
  </defs>
</svg>