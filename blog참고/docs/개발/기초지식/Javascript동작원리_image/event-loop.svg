<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="520" fill="#f8fafc"/>
  <text x="390" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">JavaScript 이벤트 루프 구조</text>

  <!-- Call Stack -->
  <rect x="40" y="70" width="300" height="200" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="190" y="98" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">Call Stack</text>
  <text x="190" y="120" text-anchor="middle" font-size="12" fill="#475569">지금 실행 중인 코드 (한 번에 하나)</text>
  <rect x="70" y="200" width="240" height="34" rx="5" fill="#bfdbfe" stroke="#3b82f6"/>
  <text x="190" y="222" text-anchor="middle" font-size="13" fill="#1e3a8a">console.log("2")</text>
  <rect x="70" y="160" width="240" height="34" rx="5" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="190" y="182" text-anchor="middle" font-size="13" fill="#1e3a8a">main()</text>
  <text x="60" y="252" font-size="11" fill="#64748b">↑ 위에서부터 쌓이고, 위에서부터 빠짐 (LIFO)</text>

  <!-- Web APIs -->
  <rect x="440" y="70" width="300" height="200" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="590" y="98" text-anchor="middle" font-size="17" font-weight="700" fill="#c2410c">Web APIs (브라우저)</text>
  <text x="590" y="120" text-anchor="middle" font-size="12" fill="#475569">비동기 작업을 대신 처리</text>
  <rect x="470" y="145" width="240" height="30" rx="5" fill="#ffedd5" stroke="#fb923c"/>
  <text x="590" y="165" text-anchor="middle" font-size="12" fill="#9a3412">Timer (setTimeout)</text>
  <rect x="470" y="185" width="240" height="30" rx="5" fill="#ffedd5" stroke="#fb923c"/>
  <text x="590" y="205" text-anchor="middle" font-size="12" fill="#9a3412">Network (fetch / ajax)</text>
  <rect x="470" y="225" width="240" height="30" rx="5" fill="#ffedd5" stroke="#fb923c"/>
  <text x="590" y="245" text-anchor="middle" font-size="12" fill="#9a3412">DOM 이벤트</text>

  <!-- arrow stack -> webapi -->
  <path d="M345 150 L435 150" stroke="#f97316" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <text x="390" y="142" text-anchor="middle" font-size="11" fill="#c2410c">위임</text>

  <!-- Microtask Queue -->
  <rect x="440" y="300" width="300" height="70" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="590" y="326" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">Microtask Queue (우선순위 높음)</text>
  <text x="590" y="350" text-anchor="middle" font-size="12" fill="#475569">Promise.then, queueMicrotask</text>

  <!-- Task Queue -->
  <rect x="440" y="390" width="300" height="70" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="590" y="416" text-anchor="middle" font-size="15" font-weight="700" fill="#7e22ce">Task Queue (Macrotask)</text>
  <text x="590" y="440" text-anchor="middle" font-size="12" fill="#475569">setTimeout, setInterval, 이벤트 콜백</text>

  <!-- webapi -> queues -->
  <path d="M590 270 L590 296" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arr2)"/>
  <text x="600" y="288" font-size="11" fill="#64748b">완료되면 큐에 등록</text>

  <!-- Event Loop -->
  <circle cx="190" cy="400" r="72" fill="#fef2f2" stroke="#ef4444" stroke-width="2.5"/>
  <text x="190" y="395" text-anchor="middle" font-size="16" font-weight="700" fill="#b91c1c">Event Loop</text>
  <text x="190" y="418" text-anchor="middle" font-size="11" fill="#475569">Stack이 비면</text>
  <text x="190" y="434" text-anchor="middle" font-size="11" fill="#475569">큐에서 꺼내 올림</text>

  <!-- queue -> event loop -->
  <path d="M435 340 C 330 350, 300 380, 265 388" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrg)"/>
  <path d="M435 425 C 340 430, 300 415, 262 412" stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#arrp)"/>

  <!-- event loop -> call stack -->
  <path d="M190 328 L190 275" stroke="#ef4444" stroke-width="2.5" fill="none" marker-end="url(#arrr)"/>
  <text x="200" y="305" font-size="11" fill="#b91c1c">Stack으로 올림</text>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#f97316"/></marker>
    <marker id="arr2" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#94a3b8"/></marker>
    <marker id="arrg" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#22c55e"/></marker>
    <marker id="arrp" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#a855f7"/></marker>
    <marker id="arrr" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#ef4444"/></marker>
  </defs>
</svg>