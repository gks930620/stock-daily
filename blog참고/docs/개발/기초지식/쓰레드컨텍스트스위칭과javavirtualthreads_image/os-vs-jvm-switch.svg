<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 470" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="470" fill="#f8fafc"/>
  <text x="390" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">OS 컨텍스트 스위칭 vs 가상 스레드 갈아끼우기</text>

  <!-- Top: OS context switch -->
  <rect x="30" y="60" width="720" height="160" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="55" y="88" font-size="15" font-weight="700" fill="#c2410c">① 기존 OS 컨텍스트 스위칭 (커널 · 무거움)</text>

  <rect x="70" y="105" width="120" height="46" rx="8" fill="#ffedd5" stroke="#fb923c"/>
  <text x="130" y="133" text-anchor="middle" font-size="13" fill="#9a3412">1번 스레드</text>
  <rect x="590" y="105" width="120" height="46" rx="8" fill="#ffedd5" stroke="#fb923c"/>
  <text x="650" y="133" text-anchor="middle" font-size="13" fill="#9a3412">2번 스레드</text>

  <rect x="230" y="100" width="320" height="56" rx="8" fill="#1e293b"/>
  <text x="390" y="123" text-anchor="middle" font-size="12" font-weight="700" fill="#fde68a">OS 커널이 개입</text>
  <text x="390" y="143" text-anchor="middle" font-size="11" fill="#e2e8f0">1번 상태를 레지스터→메모리 저장, 2번 복원</text>

  <path d="M192 128 L228 128" stroke="#f97316" stroke-width="2.5" fill="none" marker-end="url(#ao)"/>
  <path d="M552 128 L588 128" stroke="#f97316" stroke-width="2.5" fill="none" marker-end="url(#ao)"/>
  <text x="390" y="180" text-anchor="middle" font-size="12" fill="#9a3412">하드웨어 레지스터를 통째로 저장·복원 → 비용이 큼</text>
  <text x="390" y="202" text-anchor="middle" font-size="11" fill="#94a3b8">모든 스레드 전환마다 커널을 오가야 함</text>

  <!-- Bottom: JVM virtual thread mount/unmount -->
  <rect x="30" y="240" width="720" height="200" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="55" y="268" font-size="15" font-weight="700" fill="#15803d">② 가상 스레드 (JVM · 유저 모드 · 가벼움)</text>

  <rect x="60" y="285" width="150" height="60" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="135" y="310" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">가상 스레드 1번</text>
  <text x="135" y="330" text-anchor="middle" font-size="11" fill="#15803d">DB 응답 대기 (블로킹)</text>

  <rect x="315" y="285" width="230" height="60" rx="8" fill="#bbf7d0" stroke="#16a34a"/>
  <text x="430" y="309" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">JVM이 유저 메모리에서 처리</text>
  <text x="430" y="330" text-anchor="middle" font-size="11" fill="#15803d">1번 상태만 잠깐 저장(heap) → 운반 스레드에서 내림</text>

  <rect x="590" y="285" width="150" height="60" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="665" y="310" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">가상 스레드 2번</text>
  <text x="665" y="330" text-anchor="middle" font-size="11" fill="#15803d">운반 스레드에 올려 실행</text>

  <path d="M212 315 L313 315" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#ag)"/>
  <path d="M547 315 L588 315" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#ag)"/>

  <rect x="60" y="360" width="680" height="64" rx="8" fill="#dcfce7"/>
  <text x="400" y="384" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">핵심: 커널을 거치지 않고, "블로킹되는 순간에만" JVM이 가상 스레드를 갈아끼운다</text>
  <text x="400" y="406" text-anchor="middle" font-size="12" fill="#15803d">→ I/O 대기가 많은 작업(DB·네트워크)에서 특히 효과적 · CPU 계산만 하는 작업엔 이득 적음</text>

  <defs>
    <marker id="ao" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#f97316"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#16a34a"/></marker>
  </defs>
</svg>
