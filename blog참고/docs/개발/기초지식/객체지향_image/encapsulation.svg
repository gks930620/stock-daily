<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 430" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="430" fill="#f8fafc"/>
  <text x="390" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">캡슐화 — 절차지향 vs 객체지향</text>
  <text x="390" y="58" text-anchor="middle" font-size="13" fill="#64748b">데이터를 아무나 만지게 두지 말고, 정해진 통로로만 조작하게 한다</text>

  <!-- Left: 절차지향 -->
  <rect x="30" y="80" width="345" height="320" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="202" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#b91c1c">절차지향 (데이터 노출)</text>

  <rect x="140" y="130" width="125" height="46" rx="8" fill="#fecaca" stroke="#ef4444"/>
  <text x="202" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">잔액 데이터</text>
  <text x="202" y="168" text-anchor="middle" font-size="11" fill="#991b1b">balance = 1000</text>

  <rect x="45" y="250" width="90" height="40" rx="6" fill="#fff" stroke="#ef4444"/>
  <text x="90" y="275" text-anchor="middle" font-size="11" fill="#991b1b">프로시저 A</text>
  <rect x="160" y="250" width="90" height="40" rx="6" fill="#fff" stroke="#ef4444"/>
  <text x="205" y="275" text-anchor="middle" font-size="11" fill="#991b1b">프로시저 B</text>
  <rect x="275" y="250" width="90" height="40" rx="6" fill="#fff" stroke="#ef4444"/>
  <text x="320" y="275" text-anchor="middle" font-size="11" fill="#991b1b">프로시저 C</text>

  <path d="M90 248 L180 178" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M205 248 L205 178" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <path d="M320 248 L225 178" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <text x="202" y="330" text-anchor="middle" font-size="12" fill="#b91c1c">여러 프로시저가 데이터에 직접 접근</text>
  <text x="202" y="352" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">→ 누가 언제 바꿨는지 모름 (데이터 꼬임)</text>

  <!-- Right: 객체지향 -->
  <rect x="405" y="80" width="345" height="320" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="577" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#15803d">객체지향 (캡슐화)</text>

  <!-- Account object -->
  <rect x="470" y="130" width="215" height="180" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="577" y="153" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">계좌 객체 (Account)</text>

  <rect x="510" y="165" width="135" height="42" rx="8" fill="#fff" stroke="#16a34a"/>
  <text x="577" y="182" text-anchor="middle" font-size="11" fill="#166534">🔒 balance (private)</text>
  <text x="577" y="198" text-anchor="middle" font-size="10" fill="#15803d">외부에서 직접 접근 X</text>

  <rect x="490" y="222" width="80" height="34" rx="6" fill="#bbf7d0" stroke="#16a34a"/>
  <text x="530" y="243" text-anchor="middle" font-size="11" fill="#166534">입금()</text>
  <rect x="585" y="222" width="80" height="34" rx="6" fill="#bbf7d0" stroke="#16a34a"/>
  <text x="625" y="243" text-anchor="middle" font-size="11" fill="#166534">출금()</text>
  <text x="577" y="282" text-anchor="middle" font-size="10" fill="#15803d">데이터는 이 메서드들만 조작 가능</text>
  <text x="577" y="300" text-anchor="middle" font-size="10" fill="#15803d">(잔액 &lt; 0 같은 검증도 여기서)</text>

  <path d="M400 245 L468 220" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <text x="435" y="235" text-anchor="middle" font-size="10" fill="#15803d">외부 요청</text>

  <text x="577" y="342" text-anchor="middle" font-size="12" fill="#15803d">데이터를 조작할 수 있는 범위를 정함</text>
  <text x="577" y="364" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">→ 안전하고 관리하기 쉬움</text>

  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#ef4444"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#16a34a"/></marker>
  </defs>
</svg>
