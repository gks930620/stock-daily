<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="420" fill="#f8fafc"/>
  <text x="390" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">동적 바인딩 — 갈아 끼워 쓴다</text>
  <text x="390" y="58" text-anchor="middle" font-size="13" fill="#64748b">인터페이스는 그대로 두고, 실제 구현체를 그때그때 바꿔 낀다 (분리형 드라이버처럼)</text>

  <!-- interface -->
  <rect x="290" y="85" width="200" height="70" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="390" y="112" text-anchor="middle" font-size="14" font-weight="700" fill="#7e22ce">인터페이스 (손잡이)</text>
  <text x="390" y="135" text-anchor="middle" font-size="11" font-family="monospace" fill="#6b21a8">PaymentService</text>

  <!-- 3 implementations -->
  <rect x="60" y="230" width="190" height="90" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="155" y="256" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">구현체 A</text>
  <text x="155" y="280" text-anchor="middle" font-size="11" font-family="monospace" fill="#475569">KakaoPay</text>
  <text x="155" y="302" text-anchor="middle" font-size="11" fill="#94a3b8">일자 나사용 비트</text>

  <rect x="295" y="230" width="190" height="90" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="390" y="256" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">구현체 B</text>
  <text x="390" y="280" text-anchor="middle" font-size="11" font-family="monospace" fill="#475569">TossPay</text>
  <text x="390" y="302" text-anchor="middle" font-size="11" fill="#94a3b8">십자 나사용 비트</text>

  <rect x="530" y="230" width="190" height="90" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="625" y="256" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">구현체 C</text>
  <text x="625" y="280" text-anchor="middle" font-size="11" font-family="monospace" fill="#475569">NaverPay</text>
  <text x="625" y="302" text-anchor="middle" font-size="11" fill="#94a3b8">육각 나사용 비트</text>

  <!-- lines: implement -->
  <path d="M300 155 C 220 190, 170 205, 155 228" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 3" fill="none" marker-end="url(#a)"/>
  <path d="M390 157 L390 228" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 3" fill="none" marker-end="url(#a)"/>
  <path d="M480 155 C 560 190, 610 205, 625 228" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 3" fill="none" marker-end="url(#a)"/>
  <text x="390" y="195" text-anchor="middle" font-size="10" fill="#94a3b8">같은 인터페이스를 구현</text>

  <!-- client -->
  <rect x="290" y="355" width="200" height="50" rx="10" fill="#1e293b"/>
  <text x="390" y="378" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">클라이언트 코드</text>
  <text x="390" y="396" text-anchor="middle" font-size="10" font-family="monospace" fill="#fde68a">service.pay()  ← 구현이 뭐든 그대로</text>

  <text x="55" y="150" font-size="11" fill="#7e22ce">클라이언트는 인터페이스만</text>
  <text x="55" y="166" font-size="11" fill="#7e22ce">알면 됨 (내부 구현 몰라도 OK)</text>
  <text x="620" y="150" font-size="11" fill="#64748b">실제 어떤 구현이 실행될지는</text>
  <text x="620" y="166" font-size="11" fill="#64748b">런타임에 결정 (= 동적 바인딩)</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#94a3b8"/></marker>
  </defs>
</svg>
