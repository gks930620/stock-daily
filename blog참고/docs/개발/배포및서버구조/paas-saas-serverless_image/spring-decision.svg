<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="420" fill="#f8fafc"/>
  <text x="390" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">개발자 선택 가이드</text>
  <text x="390" y="56" text-anchor="middle" font-size="13" fill="#64748b">무엇을 만드느냐에 따라 답이 갈린다</text>

  <!-- start -->
  <rect x="290" y="75" width="200" height="46" rx="23" fill="#0f172a"/>
  <text x="390" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">무엇을 만드나?</text>

  <!-- branch 1: Spring app -->
  <rect x="30" y="160" width="220" height="70" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="188" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">Spring Boot 웹/API</text>
  <text x="140" y="211" text-anchor="middle" font-size="11" fill="#475569">일반 서비스 서버</text>

  <!-- branch 2: simple tasks -->
  <rect x="280" y="160" width="220" height="70" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="390" y="188" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">특정 작업만</text>
  <text x="390" y="211" text-anchor="middle" font-size="11" fill="#475569">배치·변환·알림 등 (서버 불필요)</text>

  <!-- branch 3: ready software -->
  <rect x="530" y="160" width="220" height="70" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="640" y="188" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">완성된 소프트웨어</text>
  <text x="640" y="211" text-anchor="middle" font-size="11" fill="#475569">직접 개발 안 함</text>

  <path d="M340 123 C 250 140, 180 148, 145 158" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M390 123 L390 158" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M440 123 C 530 140, 600 148, 635 158" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>

  <!-- answers -->
  <rect x="40" y="280" width="200" height="70" rx="10" fill="#3b82f6"/>
  <text x="140" y="308" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">PaaS</text>
  <text x="140" y="331" text-anchor="middle" font-size="11" fill="#dbeafe">Railway 등에 올리면 끝</text>

  <rect x="290" y="280" width="200" height="70" rx="10" fill="#22c55e"/>
  <text x="390" y="308" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Serverless</text>
  <text x="390" y="331" text-anchor="middle" font-size="11" fill="#dcfce7">필요할 때만 실행</text>

  <rect x="540" y="280" width="200" height="70" rx="10" fill="#f97316"/>
  <text x="640" y="308" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">SaaS</text>
  <text x="640" y="331" text-anchor="middle" font-size="11" fill="#ffedd5">Notion 등 골라 쓰기</text>

  <path d="M140 230 L140 278" stroke="#3b82f6" stroke-width="2.5" fill="none" marker-end="url(#ab)"/>
  <path d="M390 230 L390 278" stroke="#22c55e" stroke-width="2.5" fill="none" marker-end="url(#ag)"/>
  <path d="M640 230 L640 278" stroke="#f97316" stroke-width="2.5" fill="none" marker-end="url(#ao)"/>

  <text x="390" y="392" text-anchor="middle" font-size="12" fill="#64748b">요즘 PaaS는 자동 스케일링이 잘 돼서, 가끔 필요한 대규모 작업도 PaaS로 감당되는 경우가 많다</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#94a3b8"/></marker>
    <marker id="ab" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#3b82f6"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#22c55e"/></marker>
    <marker id="ao" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#f97316"/></marker>
  </defs>
</svg>
