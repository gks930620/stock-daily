<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="800" height="460" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">누가 무엇을 관리하는가</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#64748b">오른쪽으로 갈수록 내가 관리할 게 줄고, 제공자가 더 많이 맡는다</text>

  <!-- legend -->
  <rect x="270" y="66" width="16" height="16" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="292" y="79" font-size="12" fill="#1e3a8a">내가 관리</text>
  <rect x="390" y="66" width="16" height="16" fill="#dcfce7" stroke="#22c55e"/>
  <text x="412" y="79" font-size="12" fill="#166534">제공자가 관리</text>

  <!-- column headers -->
  <text x="70" y="112" font-size="12" font-weight="700" fill="#334155">레이어</text>
  <rect x="130" y="95" width="150" height="26" fill="#1e293b"/>
  <text x="205" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">On-premise</text>
  <rect x="284" y="95" width="150" height="26" fill="#1e293b"/>
  <text x="359" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">IaaS</text>
  <rect x="438" y="95" width="150" height="26" fill="#1e293b"/>
  <text x="513" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">PaaS</text>
  <rect x="592" y="95" width="150" height="26" fill="#1e293b"/>
  <text x="667" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">SaaS</text>

  <!-- helper: each row -->
  <!-- Row1 애플리케이션: 나 나 나 제공자 -->
  <g font-size="11">
    <rect x="10" y="125" width="115" height="42" fill="#f1f5f9" stroke="#cbd5e1"/><text x="67" y="151" text-anchor="middle" fill="#334155">애플리케이션</text>
    <rect x="130" y="125" width="150" height="42" fill="#dbeafe" stroke="#fff"/><text x="205" y="151" text-anchor="middle" fill="#1e3a8a">나</text>
    <rect x="284" y="125" width="150" height="42" fill="#dbeafe" stroke="#fff"/><text x="359" y="151" text-anchor="middle" fill="#1e3a8a">나</text>
    <rect x="438" y="125" width="150" height="42" fill="#dbeafe" stroke="#fff"/><text x="513" y="151" text-anchor="middle" fill="#1e3a8a">나</text>
    <rect x="592" y="125" width="150" height="42" fill="#dcfce7" stroke="#fff"/><text x="667" y="151" text-anchor="middle" fill="#166534">제공자</text>

    <rect x="10" y="169" width="115" height="42" fill="#f1f5f9" stroke="#cbd5e1"/><text x="67" y="195" text-anchor="middle" fill="#334155">데이터</text>
    <rect x="130" y="169" width="150" height="42" fill="#dbeafe" stroke="#fff"/><text x="205" y="195" text-anchor="middle" fill="#1e3a8a">나</text>
    <rect x="284" y="169" width="150" height="42" fill="#dbeafe" stroke="#fff"/><text x="359" y="195" text-anchor="middle" fill="#1e3a8a">나</text>
    <rect x="438" y="169" width="150" height="42" fill="#dbeafe" stroke="#fff"/><text x="513" y="195" text-anchor="middle" fill="#1e3a8a">나</text>
    <rect x="592" y="169" width="150" height="42" fill="#dcfce7" stroke="#fff"/><text x="667" y="195" text-anchor="middle" fill="#166534">제공자</text>

    <rect x="10" y="213" width="115" height="42" fill="#f1f5f9" stroke="#cbd5e1"/><text x="67" y="239" text-anchor="middle" fill="#334155">런타임</text>
    <rect x="130" y="213" width="150" height="42" fill="#dbeafe" stroke="#fff"/><text x="205" y="239" text-anchor="middle" fill="#1e3a8a">나</text>
    <rect x="284" y="213" width="150" height="42" fill="#dbeafe" stroke="#fff"/><text x="359" y="239" text-anchor="middle" fill="#1e3a8a">나</text>
    <rect x="438" y="213" width="150" height="42" fill="#dcfce7" stroke="#fff"/><text x="513" y="239" text-anchor="middle" fill="#166534">제공자</text>
    <rect x="592" y="213" width="150" height="42" fill="#dcfce7" stroke="#fff"/><text x="667" y="239" text-anchor="middle" fill="#166534">제공자</text>

    <rect x="10" y="257" width="115" height="42" fill="#f1f5f9" stroke="#cbd5e1"/><text x="67" y="283" text-anchor="middle" fill="#334155">OS · 미들웨어</text>
    <rect x="130" y="257" width="150" height="42" fill="#dbeafe" stroke="#fff"/><text x="205" y="283" text-anchor="middle" fill="#1e3a8a">나</text>
    <rect x="284" y="257" width="150" height="42" fill="#dbeafe" stroke="#fff"/><text x="359" y="283" text-anchor="middle" fill="#1e3a8a">나</text>
    <rect x="438" y="257" width="150" height="42" fill="#dcfce7" stroke="#fff"/><text x="513" y="283" text-anchor="middle" fill="#166534">제공자</text>
    <rect x="592" y="257" width="150" height="42" fill="#dcfce7" stroke="#fff"/><text x="667" y="283" text-anchor="middle" fill="#166534">제공자</text>

    <rect x="10" y="301" width="115" height="42" fill="#f1f5f9" stroke="#cbd5e1"/><text x="67" y="327" text-anchor="middle" fill="#334155">가상화 · 서버</text>
    <rect x="130" y="301" width="150" height="42" fill="#dbeafe" stroke="#fff"/><text x="205" y="327" text-anchor="middle" fill="#1e3a8a">나</text>
    <rect x="284" y="301" width="150" height="42" fill="#dcfce7" stroke="#fff"/><text x="359" y="327" text-anchor="middle" fill="#166534">제공자</text>
    <rect x="438" y="301" width="150" height="42" fill="#dcfce7" stroke="#fff"/><text x="513" y="327" text-anchor="middle" fill="#166534">제공자</text>
    <rect x="592" y="301" width="150" height="42" fill="#dcfce7" stroke="#fff"/><text x="667" y="327" text-anchor="middle" fill="#166534">제공자</text>

    <rect x="10" y="345" width="115" height="42" fill="#f1f5f9" stroke="#cbd5e1"/><text x="67" y="371" text-anchor="middle" fill="#334155">스토리지 · 네트워크</text>
    <rect x="130" y="345" width="150" height="42" fill="#dbeafe" stroke="#fff"/><text x="205" y="371" text-anchor="middle" fill="#1e3a8a">나</text>
    <rect x="284" y="345" width="150" height="42" fill="#dcfce7" stroke="#fff"/><text x="359" y="371" text-anchor="middle" fill="#166534">제공자</text>
    <rect x="438" y="345" width="150" height="42" fill="#dcfce7" stroke="#fff"/><text x="513" y="371" text-anchor="middle" fill="#166534">제공자</text>
    <rect x="592" y="345" width="150" height="42" fill="#dcfce7" stroke="#fff"/><text x="667" y="371" text-anchor="middle" fill="#166534">제공자</text>
  </g>

  <!-- examples -->
  <text x="205" y="408" text-anchor="middle" font-size="11" fill="#94a3b8">직접 서버실 운영</text>
  <text x="359" y="408" text-anchor="middle" font-size="11" fill="#94a3b8">AWS EC2</text>
  <text x="513" y="408" text-anchor="middle" font-size="11" fill="#94a3b8">Railway · Heroku</text>
  <text x="667" y="408" text-anchor="middle" font-size="11" fill="#94a3b8">Notion · Slack</text>

  <text x="400" y="440" text-anchor="middle" font-size="12" fill="#64748b">Spring 개발자는 보통 PaaS — 앱과 데이터만 신경 쓰고 나머지는 플랫폼에 맡긴다</text>
</svg>
