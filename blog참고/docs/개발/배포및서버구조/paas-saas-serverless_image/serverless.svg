<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="400" fill="#f8fafc"/>
  <text x="390" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">상시 서버(PaaS) vs Serverless</text>
  <text x="390" y="56" text-anchor="middle" font-size="13" fill="#64748b">Serverless는 요청/이벤트가 있을 때만 실행되고, 그만큼만 과금된다</text>

  <!-- PaaS: always on -->
  <rect x="30" y="80" width="720" height="130" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="55" y="108" font-size="15" font-weight="700" fill="#1d4ed8">PaaS — 상시 실행 (항상 켜져 있음)</text>
  <text x="55" y="128" font-size="11" fill="#64748b">시간 →</text>

  <!-- continuous bar -->
  <rect x="60" y="140" width="660" height="34" rx="6" fill="#bfdbfe" stroke="#3b82f6"/>
  <text x="390" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">서버가 계속 돌아감 (요청이 없어도)</text>
  <text x="55" y="196" font-size="11" fill="#1d4ed8">💰 요청이 없는 새벽에도 계속 비용 발생</text>

  <!-- Serverless: spiky -->
  <rect x="30" y="225" width="720" height="150" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="55" y="253" font-size="15" font-weight="700" fill="#15803d">Serverless — 이벤트 시에만 실행</text>
  <text x="55" y="273" font-size="11" fill="#64748b">시간 →</text>

  <!-- baseline -->
  <line x1="60" y1="330" x2="720" y2="330" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="70" y="345" font-size="10" fill="#94a3b8">평소: 실행 0 (비용 0)</text>

  <!-- spikes -->
  <rect x="150" y="292" width="45" height="38" rx="4" fill="#22c55e"/>
  <text x="172" y="286" text-anchor="middle" font-size="10" fill="#15803d">이벤트</text>
  <rect x="360" y="285" width="45" height="45" rx="4" fill="#22c55e"/>
  <text x="382" y="279" text-anchor="middle" font-size="10" fill="#15803d">요청</text>
  <rect x="560" y="298" width="45" height="32" rx="4" fill="#22c55e"/>
  <text x="582" y="292" text-anchor="middle" font-size="10" fill="#15803d">알림</text>

  <text x="55" y="365" font-size="11" fill="#15803d">💰 실행된 그 순간만 과금 — 가끔 실행되는 작업에 유리</text>

  <text x="390" y="392" text-anchor="middle" font-size="11" fill="#94a3b8">예) AWS Lambda · Cloud Functions · Cloudflare Workers</text>
</svg>
