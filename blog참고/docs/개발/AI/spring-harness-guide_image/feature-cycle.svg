<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="820" height="560" fill="#f8fafc"/>
  <text x="410" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">기능 하나당 자동 반복 사이클</text>
  <text x="410" y="60" text-anchor="middle" font-size="13" fill="#64748b">기능 = 스프린트 티켓 하나 크기 · TDD(tester가 developer보다 앞)</text>

  <!-- CLAUDE.md living memory (left side) -->
  <rect x="30" y="100" width="150" height="360" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="105" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#c2410c">CLAUDE.md</text>
  <text x="105" y="152" text-anchor="middle" font-size="11" fill="#9a3412">살아있는 기억</text>
  <text x="105" y="170" text-anchor="middle" font-size="11" fill="#9a3412">(계속 업데이트)</text>
  <text x="105" y="300" text-anchor="middle" font-size="11" fill="#94a3b8" transform="rotate(-90 105 300)">모든 에이전트가 이 규칙을 따른다</text>

  <!-- 1 architect -->
  <rect x="250" y="95" width="320" height="56" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">① architect (설계)</text>
  <text x="410" y="140" text-anchor="middle" font-size="11" fill="#475569">도메인 설계 + CLAUDE.md 업데이트</text>

  <!-- 2 reviewer design -->
  <rect x="250" y="175" width="320" height="56" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="410" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#7e22ce">② reviewer (설계 검토)</text>
  <text x="410" y="220" text-anchor="middle" font-size="11" fill="#475569">문제 시 architect 재작업</text>

  <!-- 3 tester -->
  <rect x="250" y="255" width="320" height="56" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="410" y="280" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">③ tester (TDD)</text>
  <text x="410" y="300" text-anchor="middle" font-size="11" fill="#475569">테스트 코드 먼저 작성 = 구현 명세서</text>

  <!-- 4 developers parallel -->
  <text x="410" y="338" text-anchor="middle" font-size="12" font-weight="700" fill="#c2410c">④ developer A · B · C — 병렬 독립 구현</text>
  <rect x="250" y="350" width="100" height="52" rx="9" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
  <text x="300" y="373" text-anchor="middle" font-size="12" font-weight="700" fill="#c2410c">dev-A</text>
  <text x="300" y="391" text-anchor="middle" font-size="10" fill="#9a3412">독립 구현</text>
  <rect x="360" y="350" width="100" height="52" rx="9" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
  <text x="410" y="373" text-anchor="middle" font-size="12" font-weight="700" fill="#c2410c">dev-B</text>
  <text x="410" y="391" text-anchor="middle" font-size="10" fill="#9a3412">독립 구현</text>
  <rect x="470" y="350" width="100" height="52" rx="9" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
  <text x="520" y="373" text-anchor="middle" font-size="12" font-weight="700" fill="#c2410c">dev-C</text>
  <text x="520" y="391" text-anchor="middle" font-size="10" fill="#9a3412">독립 구현</text>

  <!-- 5 reviewer compare -->
  <rect x="250" y="428" width="320" height="60" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="410" y="453" text-anchor="middle" font-size="14" font-weight="700" fill="#7e22ce">⑤ reviewer (비교 검토)</text>
  <text x="410" y="474" text-anchor="middle" font-size="11" fill="#475569">세 결과물 비교 → 최선 선택 · 미달 시 재작업</text>

  <!-- down arrows -->
  <path d="M410 152 L410 173" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M410 232 L410 253" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M410 312 L410 346" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M300 404 L360 425" stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#ap)"/>
  <path d="M410 404 L410 425" stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#ap)"/>
  <path d="M520 404 L460 425" stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#ap)"/>

  <!-- architect updates CLAUDE.md -->
  <path d="M248 123 L182 130" stroke="#f97316" stroke-width="2" fill="none" marker-end="url(#ao)"/>
  <text x="215" y="115" text-anchor="middle" font-size="10" fill="#c2410c">업데이트</text>

  <!-- rework loops (right side) -->
  <path d="M572 203 C 640 203, 640 123, 572 123" stroke="#ef4444" stroke-width="2" fill="none" stroke-dasharray="5 3" marker-end="url(#ar)"/>
  <text x="662" y="167" text-anchor="middle" font-size="10" fill="#b91c1c">설계 문제 시</text>
  <text x="662" y="181" text-anchor="middle" font-size="10" fill="#b91c1c">재작업</text>

  <path d="M572 460 C 720 460, 720 375, 572 376" stroke="#ef4444" stroke-width="2" fill="none" stroke-dasharray="5 3" marker-end="url(#ar)"/>
  <text x="710" y="425" text-anchor="middle" font-size="10" fill="#b91c1c">미달 시</text>
  <text x="710" y="439" text-anchor="middle" font-size="10" fill="#b91c1c">재작업</text>

  <text x="410" y="525" text-anchor="middle" font-size="12" fill="#64748b">기능 완성 → 다음 기능으로 같은 사이클 반복 (3~5개 기능마다 통합 테스트)</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#94a3b8"/></marker>
    <marker id="ap" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#a855f7"/></marker>
    <marker id="ao" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#f97316"/></marker>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#ef4444"/></marker>
  </defs>
</svg>