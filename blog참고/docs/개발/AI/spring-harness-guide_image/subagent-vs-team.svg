<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="400" fill="#f8fafc"/>
  <text x="390" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">서브에이전트 vs 에이전트 팀</text>

  <!-- Left: Subagents (sequential) -->
  <rect x="30" y="65" width="345" height="290" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="202" y="95" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">서브에이전트 (Subagents)</text>
  <text x="202" y="117" text-anchor="middle" font-size="12" fill="#475569">한 세션 안에서 순차 실행</text>

  <rect x="130" y="140" width="145" height="40" rx="8" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="202" y="165" text-anchor="middle" font-size="13" fill="#1e3a8a">개발 A</text>
  <rect x="130" y="205" width="145" height="40" rx="8" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="202" y="230" text-anchor="middle" font-size="13" fill="#1e3a8a">개발 B</text>
  <rect x="130" y="270" width="145" height="40" rx="8" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="202" y="295" text-anchor="middle" font-size="13" fill="#1e3a8a">개발 C</text>

  <path d="M202 182 L202 203" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#ab)"/>
  <path d="M202 247 L202 268" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#ab)"/>
  <text x="300" y="230" text-anchor="middle" font-size="11" fill="#64748b">하나씩</text>
  <text x="300" y="246" text-anchor="middle" font-size="11" fill="#64748b">차례로</text>
  <text x="202" y="338" text-anchor="middle" font-size="11" fill="#94a3b8">정식 기능</text>

  <!-- Right: Agent Teams (parallel) -->
  <rect x="405" y="65" width="345" height="290" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="577" y="95" text-anchor="middle" font-size="16" font-weight="700" fill="#15803d">에이전트 팀 (Agent Teams)</text>
  <text x="577" y="117" text-anchor="middle" font-size="12" fill="#475569">여러 인스턴스가 병렬 실행</text>

  <rect x="435" y="150" width="95" height="46" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="482" y="178" text-anchor="middle" font-size="13" fill="#166534">개발 A</text>
  <rect x="530" y="150" width="95" height="46" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="577" y="178" text-anchor="middle" font-size="13" fill="#166534">개발 B</text>
  <rect x="625" y="150" width="95" height="46" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="672" y="178" text-anchor="middle" font-size="13" fill="#166534">개발 C</text>
  <text x="577" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">동시에 실행</text>

  <!-- communication -->
  <rect x="465" y="245" width="225" height="55" rx="8" fill="#bbf7d0" stroke="#16a34a"/>
  <text x="577" y="270" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">작업 목록 · 메시지로 협업</text>
  <text x="577" y="290" text-anchor="middle" font-size="11" fill="#15803d">서로 소통하며 진행</text>
  <path d="M482 198 L520 243" stroke="#16a34a" stroke-width="1.5" fill="none"/>
  <path d="M577 198 L577 243" stroke="#16a34a" stroke-width="1.5" fill="none"/>
  <path d="M672 198 L634 243" stroke="#16a34a" stroke-width="1.5" fill="none"/>
  <text x="577" y="338" text-anchor="middle" font-size="11" fill="#b45309">⚠ 실험적 기능 (기본 비활성 → 켜야 함)</text>

  <defs>
    <marker id="ab" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#3b82f6"/></marker>
  </defs>
</svg>