<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 480" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="480" fill="#f8fafc"/>
  <text x="390" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">AI 코딩의 큰 그림</text>
  <text x="390" y="60" text-anchor="middle" font-size="13" fill="#64748b">"AI를 신입사원 채용하듯 대한다"</text>

  <!-- 2 principles -->
  <text x="390" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">2가지 핵심 원칙</text>

  <rect x="60" y="105" width="320" height="90" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="220" y="135" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">① 제멋대로 못 고치게</text>
  <text x="220" y="160" text-anchor="middle" font-size="12" fill="#475569">정해진 범위 · 정해진 기능만</text>
  <text x="220" y="180" text-anchor="middle" font-size="12" fill="#475569">건드리도록 규칙을 준다</text>

  <rect x="400" y="105" width="320" height="90" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="560" y="135" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">② 여러 명이 협업하듯</text>
  <text x="560" y="160" text-anchor="middle" font-size="12" fill="#475569">역할을 나눠서 여러 AI(세션)가</text>
  <text x="560" y="180" text-anchor="middle" font-size="12" fill="#475569">각자 맡은 일만 하도록</text>

  <!-- arrows down -->
  <path d="M180 198 L150 258" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M390 198 L390 258" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M560 198 L620 258" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <text x="390" y="225" text-anchor="middle" font-size="12" fill="#64748b">이걸 실현하는 3가지 도구</text>

  <!-- 3 tools -->
  <rect x="45" y="265" width="220" height="120" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="155" y="295" text-anchor="middle" font-size="15" font-weight="700" fill="#c2410c">CLAUDE.md</text>
  <text x="155" y="322" text-anchor="middle" font-size="12" fill="#475569">프로젝트 규칙·컨벤션을</text>
  <text x="155" y="340" text-anchor="middle" font-size="12" fill="#475569">적어두는 "사규" 문서</text>
  <text x="155" y="368" text-anchor="middle" font-size="11" fill="#94a3b8">매 세션 자동 로드</text>

  <rect x="280" y="265" width="220" height="120" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="390" y="295" text-anchor="middle" font-size="15" font-weight="700" fill="#c2410c">역할별 규칙 문서(.md)</text>
  <text x="390" y="322" text-anchor="middle" font-size="12" fill="#475569">각 AI가 지켜야 할</text>
  <text x="390" y="340" text-anchor="middle" font-size="12" fill="#475569">코딩 규칙 모음</text>
  <text x="390" y="368" text-anchor="middle" font-size="11" fill="#94a3b8">Skills / SKILL.md</text>

  <rect x="515" y="265" width="220" height="120" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="625" y="295" text-anchor="middle" font-size="15" font-weight="700" fill="#c2410c">역할 분리</text>
  <text x="625" y="322" text-anchor="middle" font-size="12" fill="#475569">기획·개발·테스트·리뷰를</text>
  <text x="625" y="340" text-anchor="middle" font-size="12" fill="#475569">서로 다른 AI에게 맡김</text>
  <text x="625" y="368" text-anchor="middle" font-size="11" fill="#94a3b8">에이전트 / 세션 분리</text>

  <!-- conclusion -->
  <rect x="60" y="410" width="660" height="46" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="390" y="438" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">코딩 실력보다 기획 · 계획 · 문서화가 훨씬 중요하다</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#94a3b8"/></marker>
  </defs>
</svg>