<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 540" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="540" fill="#f8fafc"/>
  <text x="390" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">역할별 AI 팀 (실제 개발팀처럼)</text>
  <text x="390" y="60" text-anchor="middle" font-size="13" fill="#64748b">한 AI가 다 하지 않고, 역할을 나눠서 각자 맡은 일만</text>

  <!-- 팀장 -->
  <rect x="310" y="85" width="160" height="46" rx="23" fill="#0f172a"/>
  <text x="390" y="113" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">팀장 (나)</text>

  <!-- 기획 AI -->
  <rect x="290" y="160" width="200" height="60" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="390" y="185" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">기획 AI</text>
  <text x="390" y="207" text-anchor="middle" font-size="11" fill="#475569">요구사항 · 설계 정리</text>

  <!-- 테스터 AI -->
  <rect x="290" y="245" width="200" height="60" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="390" y="270" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">테스터 AI</text>
  <text x="390" y="292" text-anchor="middle" font-size="11" fill="#475569">TDD · 기능별 테스트 먼저 작성</text>

  <!-- 개발 AI (branches) -->
  <text x="390" y="335" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">개발 AI 2~3명 · 각자 독립 브랜치</text>
  <rect x="55" y="350" width="200" height="66" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="155" y="374" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">개발 AI · A</text>
  <text x="155" y="396" text-anchor="middle" font-size="11" font-family="monospace" fill="#9a3412">branch: feat-a</text>

  <rect x="290" y="350" width="200" height="66" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="390" y="374" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">개발 AI · B</text>
  <text x="390" y="396" text-anchor="middle" font-size="11" font-family="monospace" fill="#9a3412">branch: feat-b</text>

  <rect x="525" y="350" width="200" height="66" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="625" y="374" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">개발 AI · C</text>
  <text x="625" y="396" text-anchor="middle" font-size="11" font-family="monospace" fill="#9a3412">branch: feat-c</text>

  <!-- 리뷰 AI -->
  <rect x="230" y="445" width="320" height="56" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="390" y="470" text-anchor="middle" font-size="14" font-weight="700" fill="#7e22ce">리뷰 AI</text>
  <text x="390" y="490" text-anchor="middle" font-size="11" fill="#475569">테스트 돌려 검증 → 팀장이 merge할 것 선택</text>

  <!-- vertical arrows -->
  <path d="M390 133 L390 158" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M390 222 L390 243" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <!-- test -> 3 devs -->
  <path d="M330 307 C 250 325, 180 335, 155 348" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M390 307 L390 348" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M450 307 C 530 325, 600 335, 625 348" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <!-- 3 devs -> review -->
  <path d="M155 418 C 180 435, 260 445, 300 452" stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#ap)"/>
  <path d="M390 418 L390 443" stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#ap)"/>
  <path d="M625 418 C 600 435, 520 445, 480 452" stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#ap)"/>

  <text x="390" y="527" text-anchor="middle" font-size="12" fill="#64748b">각 AI는 자기 역할만 · 기능마다 md 문서로 정리 → 코드는 꼭 필요할 때만 확인</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#94a3b8"/></marker>
    <marker id="ap" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#a855f7"/></marker>
  </defs>
</svg>