<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="520" fill="#f8fafc"/>
  <text x="390" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Claude Code 권한 모드</text>

  <!-- Shift+Tab cycle badge -->
  <rect x="300" y="55" width="180" height="30" rx="15" fill="#1e293b"/>
  <text x="390" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Shift + Tab 으로 순환</text>

  <!-- 3 modes in a row -->
  <rect x="40" y="110" width="220" height="110" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="150" y="138" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">Default (기본)</text>
  <text x="150" y="165" text-anchor="middle" font-size="12" fill="#475569">파일 수정·명령 실행 전</text>
  <text x="150" y="183" text-anchor="middle" font-size="12" fill="#475569">매번 물어봄</text>
  <text x="150" y="205" text-anchor="middle" font-size="11" fill="#94a3b8">가장 안전</text>

  <rect x="280" y="110" width="220" height="110" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="390" y="138" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">Auto-accept edits</text>
  <text x="390" y="165" text-anchor="middle" font-size="12" fill="#475569">파일 수정·기본 명령을</text>
  <text x="390" y="183" text-anchor="middle" font-size="12" fill="#475569">묻지 않고 바로 실행</text>
  <text x="390" y="205" text-anchor="middle" font-size="11" fill="#94a3b8">빠름</text>

  <rect x="520" y="110" width="220" height="110" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="630" y="138" text-anchor="middle" font-size="15" font-weight="700" fill="#7e22ce">Plan mode (계획)</text>
  <text x="630" y="165" text-anchor="middle" font-size="12" fill="#475569">소스는 안 건드리고</text>
  <text x="630" y="183" text-anchor="middle" font-size="12" fill="#475569">"계획"만 세워서 보여줌</text>
  <text x="630" y="205" text-anchor="middle" font-size="11" fill="#94a3b8">먼저 여기서 시작 추천</text>

  <!-- cycle arrows -->
  <path d="M262 145 L278 145" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
  <path d="M502 145 L518 145" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
  <path d="M630 224 C 630 250, 150 250, 150 224" stroke="#64748b" stroke-width="2.5" fill="none" stroke-dasharray="6 4" marker-end="url(#a)"/>
  <text x="390" y="245" text-anchor="middle" font-size="11" fill="#64748b">계속 순환</text>

  <!-- Bypass (separate) -->
  <rect x="180" y="285" width="420" height="90" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="390" y="313" text-anchor="middle" font-size="15" font-weight="700" fill="#b91c1c">⚠ Bypass permissions (권한 건너뛰기)</text>
  <text x="390" y="337" text-anchor="middle" font-size="12" fill="#475569">Shift+Tab 순환에 없음 · 실행 시 별도 플래그로 켬</text>
  <text x="390" y="357" text-anchor="middle" font-size="12" font-family="monospace" fill="#b91c1c">claude --dangerously-skip-permissions</text>
  <text x="390" y="373" text-anchor="middle" font-size="11" fill="#94a3b8">확인 없이 전부 실행 → 위험, 정말 신뢰할 때만</text>

  <!-- recommended flow -->
  <text x="390" y="415" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">추천 흐름</text>
  <rect x="55" y="430" width="150" height="50" rx="8" fill="#faf5ff" stroke="#a855f7"/>
  <text x="130" y="452" text-anchor="middle" font-size="12" font-weight="700" fill="#7e22ce">① Plan mode</text>
  <text x="130" y="470" text-anchor="middle" font-size="11" fill="#475569">계획을 완벽히</text>

  <rect x="245" y="430" width="150" height="50" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="320" y="452" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">② 검토 후 코딩</text>
  <text x="320" y="470" text-anchor="middle" font-size="11" fill="#475569">Default / Auto-accept</text>

  <rect x="435" y="430" width="290" height="50" rx="8" fill="#fef2f2" stroke="#ef4444"/>
  <text x="580" y="452" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">③ 안전하면 Bypass도 OK</text>
  <text x="580" y="470" text-anchor="middle" font-size="11" fill="#475569">계획이 완벽하고 위험이 적을 때만</text>

  <path d="M207 455 L243 455" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
  <path d="M397 455 L433 455" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#a)"/>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#64748b"/></marker>
  </defs>
</svg>