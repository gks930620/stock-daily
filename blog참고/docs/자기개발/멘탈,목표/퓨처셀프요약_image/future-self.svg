<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="320" fill="#f8fafc"/>
  <text x="390" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">퓨처 셀프 (Future Self)</text>
  <text x="390" y="56" text-anchor="middle" font-size="13" fill="#64748b">미래의 내가 "지금의 나"를 어떻게 볼지 상상해 본다</text>

  <!-- 현재의 나 -->
  <rect x="60" y="100" width="240" height="110" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="180" y="130" text-anchor="middle" font-size="28">🙂</text>
  <text x="180" y="162" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">현재의 나</text>
  <text x="180" y="186" text-anchor="middle" font-size="11" fill="#475569">지금 무엇을 하고 있나</text>

  <!-- 미래의 나 -->
  <rect x="480" y="100" width="240" height="110" rx="12" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="600" y="130" text-anchor="middle" font-size="28">😎</text>
  <text x="600" y="162" text-anchor="middle" font-size="15" font-weight="700" fill="#7e22ce">바라는 미래의 나</text>
  <text x="600" y="186" text-anchor="middle" font-size="11" fill="#475569">되고 싶은 모습</text>

  <!-- 미래가 과거(현재)를 돌아봄 -->
  <path d="M478 135 C 390 115, 290 115, 302 135" stroke="#a855f7" stroke-width="2.5" fill="none" marker-end="url(#ap)"/>
  <text x="390" y="108" text-anchor="middle" font-size="11" fill="#7e22ce">미래의 내가 과거(현재)를 돌아봄</text>

  <!-- 판단 -->
  <rect x="230" y="240" width="150" height="56" rx="10" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="305" y="264" text-anchor="middle" font-size="12" fill="#166534">모습이 같다면</text>
  <text x="305" y="284" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">→ 원하는 미래 달성</text>

  <rect x="400" y="240" width="150" height="56" rx="10" fill="#fef2f2" stroke="#ef4444"/>
  <text x="475" y="264" text-anchor="middle" font-size="12" fill="#991b1b">다르다면</text>
  <text x="475" y="284" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">→ 되지 못함</text>

  <path d="M180 212 C 200 228, 250 232, 290 238" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M600 212 C 580 228, 520 232, 490 238" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#94a3b8"/></marker>
    <marker id="ap" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#a855f7"/></marker>
  </defs>
</svg>
