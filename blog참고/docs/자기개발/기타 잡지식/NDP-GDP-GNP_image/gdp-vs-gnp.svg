<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="420" fill="#f8fafc"/>
  <text x="390" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">GDP(영역) vs GNP(국적)</text>
  <text x="390" y="56" text-anchor="middle" font-size="13" fill="#64748b">GDP는 "어디서" 생산했나, GNP는 "누가" 생산했나로 나눈다</text>

  <!-- 한국 영토 -->
  <rect x="40" y="90" width="360" height="220" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="60" y="114" font-size="13" font-weight="700" fill="#4338ca">🇰🇷 한국 영토 (국내)</text>

  <!-- 해외 -->
  <rect x="420" y="90" width="320" height="220" rx="12" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="440" y="114" font-size="13" font-weight="700" fill="#a16207">🌍 해외</text>

  <!-- actors -->
  <rect x="70" y="150" width="140" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="140" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">한국인/기업</text>
  <text x="140" y="200" text-anchor="middle" font-size="11" fill="#475569">국내 생산</text>

  <rect x="235" y="150" width="140" height="70" rx="8" fill="#fee2e2" stroke="#ef4444"/>
  <text x="305" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">외국 기업</text>
  <text x="305" y="200" text-anchor="middle" font-size="11" fill="#475569">한국 내 생산</text>

  <rect x="460" y="150" width="240" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="580" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">한국인/기업</text>
  <text x="580" y="200" text-anchor="middle" font-size="11" fill="#475569">해외 생산</text>

  <!-- GDP boundary: everything inside 한국 영토 -->
  <rect x="55" y="135" width="335" height="100" rx="12" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="7 4"/>
  <text x="222" y="255" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">GDP (국내총생산) — 파란 점선</text>
  <text x="222" y="274" text-anchor="middle" font-size="11" fill="#475569">한국 영토 안이면 국적 상관없이 포함</text>

  <!-- GNP boundary: Korean nationals (국내 한국인 + 해외 한국인) -->
  <path d="M65 145 L205 145 L205 300 L700 300 L700 145 L455 145 L455 225 L65 225 Z"
        fill="none" stroke="#f97316" stroke-width="2.5" stroke-dasharray="3 3"/>
  <text x="580" y="255" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">GNP (국민총생산) — 주황 점선</text>
  <text x="580" y="274" text-anchor="middle" font-size="11" fill="#475569">한국 국적이면 어디서 생산하든 포함</text>

  <!-- summary -->
  <text x="390" y="340" text-anchor="middle" font-size="12" fill="#334155">외국기업의 한국 생산 = GDP만 포함  ·  한국인의 해외 생산 = GNP만 포함</text>
  <text x="390" y="366" text-anchor="middle" font-size="11" fill="#94a3b8">감가상각을 빼면(Net) GDP → NDP가 된다</text>
</svg>
