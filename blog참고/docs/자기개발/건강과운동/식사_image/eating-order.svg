<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 380" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="380" fill="#f8fafc"/>
  <text x="390" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">먹는 순서와 식습관 개선</text>

  <!-- eating order -->
  <text x="390" y="66" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">① 먹는 순서 — 채소·과일 먼저</text>

  <rect x="60" y="85" width="180" height="90" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="150" y="118" text-anchor="middle" font-size="30">🥗</text>
  <text x="150" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">샐러드·토마토·바나나</text>
  <text x="150" y="164" text-anchor="middle" font-size="11" fill="#475569">먼저 먹기</text>

  <path d="M245 130 L305 130" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#a)"/>

  <rect x="310" y="85" width="180" height="90" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="400" y="118" text-anchor="middle" font-size="30">🍚</text>
  <text x="400" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">밥·주식</text>
  <text x="400" y="164" text-anchor="middle" font-size="11" fill="#475569">양을 줄여서</text>

  <rect x="530" y="85" width="190" height="90" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="625" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">식욕 억제 팁</text>
  <text x="625" y="140" text-anchor="middle" font-size="11" fill="#475569">이마 두드리기</text>
  <text x="625" y="160" text-anchor="middle" font-size="11" fill="#475569">배고픈 이미지 안 보기</text>

  <!-- reset concept -->
  <text x="390" y="222" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">② 개선 방식 — 한 번에 확 리셋</text>

  <!-- graph -->
  <rect x="120" y="240" width="540" height="115" rx="12" fill="#fff" stroke="#cbd5e1"/>
  <line x1="150" y1="335" x2="630" y2="335" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="150" y="352" font-size="10" fill="#94a3b8">시간 →</text>

  <!-- gradual (dashed, slow) -->
  <path d="M150 320 L630 300" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 3" fill="none"/>
  <text x="560" y="292" font-size="10" fill="#94a3b8">깨작깨작 (느림)</text>

  <!-- strict reset then improve (green) -->
  <path d="M150 320 L280 258 L630 250" stroke="#22c55e" stroke-width="3" fill="none"/>
  <circle cx="280" cy="258" r="5" fill="#22c55e"/>
  <text x="230" y="248" font-size="11" font-weight="700" fill="#15803d">엄격한 리셋</text>
  <text x="470" y="243" font-size="11" fill="#15803d">→ 조금 나은 생활 유지</text>

  <text x="390" y="372" text-anchor="middle" font-size="11" fill="#64748b">엄격하게 몸을 원상태로 되돌린 뒤, 이전보다 조금 나은 생활을 이어가면 체감 개선이 크다</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#64748b"/></marker>
  </defs>
</svg>
