<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="860" height="400" fill="#f8fafc"/>
  <text x="430" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">건성 피부 아침 루틴 (묽은 것 → 꾸덕한 것 → 선크림)</text>
  <text x="430" y="56" text-anchor="middle" font-size="13" fill="#64748b">세안 직후 → 토너 → 세럼 → 크림 → (아침만) 선크림</text>

  <!-- gradient bar over first 3 -->
  <rect x="25" y="78" width="590" height="10" rx="5" fill="url(#grad)"/>
  <text x="32" y="100" font-size="10" fill="#3b82f6">묽음(수분)</text>
  <text x="608" y="100" font-size="10" fill="#c2410c" text-anchor="end">꾸덕(유분)</text>
  <text x="740" y="100" font-size="10" fill="#ca8a04" text-anchor="middle">보호막(맨 위)</text>

  <!-- Step 1: 토너 -->
  <rect x="25" y="115" width="185" height="215" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="55" cy="146" r="15" fill="#3b82f6"/><text x="55" y="151" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">1</text>
  <text x="135" y="151" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">토너 = 스킨</text>
  <text x="117" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">수분 공급</text>
  <text x="117" y="206" text-anchor="middle" font-size="11" fill="#475569">세안 직후, 물기</text>
  <text x="117" y="222" text-anchor="middle" font-size="11" fill="#475569">마르기 전에</text>
  <text x="117" y="252" text-anchor="middle" font-size="11" fill="#475569">찹찹 두드려</text>
  <text x="117" y="268" text-anchor="middle" font-size="11" fill="#475569">2~3번 레이어링</text>
  <text x="117" y="298" text-anchor="middle" font-size="10" fill="#94a3b8">→ 속당김 감소</text>

  <!-- Step 2: 세럼 -->
  <rect x="220" y="115" width="185" height="215" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <circle cx="250" cy="146" r="15" fill="#22c55e"/><text x="250" y="151" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">2</text>
  <text x="330" y="151" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">세럼 = 영양제</text>
  <text x="312" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">고농축 영양</text>
  <text x="312" y="206" text-anchor="middle" font-size="11" fill="#475569">토너 스며든 후</text>
  <text x="312" y="222" text-anchor="middle" font-size="11" fill="#475569">얼굴 전체에</text>
  <text x="312" y="252" text-anchor="middle" font-size="11" fill="#475569">추천 성분:</text>
  <text x="312" y="270" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">세라마이드·판테놀</text>
  <text x="312" y="286" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">히알루론산</text>

  <!-- Step 3: 크림 -->
  <rect x="415" y="115" width="185" height="215" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <circle cx="445" cy="146" r="15" fill="#f97316"/><text x="445" y="151" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">3</text>
  <text x="525" y="151" text-anchor="middle" font-size="15" font-weight="700" fill="#c2410c">크림 = 로션</text>
  <text x="507" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">유분 잠금장치</text>
  <text x="507" y="206" text-anchor="middle" font-size="11" fill="#475569">스킨케어 마지막</text>
  <text x="507" y="234" text-anchor="middle" font-size="11" font-weight="700" fill="#c2410c">꾸덕한 보습</text>
  <text x="507" y="250" text-anchor="middle" font-size="11" font-weight="700" fill="#c2410c">(장벽) 크림</text>
  <text x="507" y="278" text-anchor="middle" font-size="10" fill="#94a3b8">→ 수분 증발 방지</text>

  <!-- Step 4: 선크림 -->
  <rect x="610" y="115" width="225" height="215" rx="12" fill="#fefce8" stroke="#eab308" stroke-width="2.5"/>
  <circle cx="642" cy="146" r="15" fill="#eab308"/><text x="642" y="151" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">4</text>
  <text x="735" y="151" text-anchor="middle" font-size="15" font-weight="700" fill="#a16207">☀️ 선크림</text>
  <rect x="695" y="163" width="90" height="20" rx="10" fill="#fde047"/>
  <text x="740" y="178" text-anchor="middle" font-size="10" font-weight="700" fill="#854d0e">아침만!</text>
  <text x="722" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#854d0e">자외선 차단막</text>
  <text x="722" y="230" text-anchor="middle" font-size="11" fill="#475569">기초 다 흡수된 후,</text>
  <text x="722" y="246" text-anchor="middle" font-size="11" fill="#475569">가장 마지막에</text>
  <text x="722" y="272" text-anchor="middle" font-size="11" fill="#475569">야외 땐 2~3시간마다</text>
  <text x="722" y="288" text-anchor="middle" font-size="11" fill="#475569">덧바르기</text>
  <text x="722" y="312" text-anchor="middle" font-size="10" fill="#b45309">밤엔 X · 자기 전 꼭 클렌징으로 제거</text>

  <!-- arrows -->
  <path d="M212 222 L218 222" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
  <path d="M407 222 L413 222" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
  <path d="M602 222 L608 222" stroke="#eab308" stroke-width="2.5" fill="none" marker-end="url(#ay)"/>

  <text x="430" y="366" text-anchor="middle" font-size="12" fill="#334155">비유: ① 수분 → ② 영양 → ③ 뚜껑 덮기 → ④ (아침) 햇빛 우산 씌우기</text>

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#93c5fd"/>
      <stop offset="0.5" stop-color="#86efac"/>
      <stop offset="1" stop-color="#fdba74"/>
    </linearGradient>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#64748b"/></marker>
    <marker id="ay" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#eab308"/></marker>
  </defs>
</svg>
