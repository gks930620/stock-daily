<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="400" fill="#f8fafc"/>
  <text x="390" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">하루 수면 리듬 (기상 6시 · 취침 11시)</text>
  <text x="390" y="56" text-anchor="middle" font-size="13" fill="#64748b">기상·취침 시간을 늘 일정하게 유지하는 것이 핵심</text>

  <!-- timeline base -->
  <rect x="40" y="150" width="700" height="40" rx="8" fill="#e2e8f0"/>
  <!-- sleep block (night) -->
  <rect x="40" y="150" width="120" height="40" rx="8" fill="#1e293b"/>
  <rect x="640" y="150" width="100" height="40" fill="#1e293b"/>
  <rect x="700" y="150" width="40" height="40" rx="8" fill="#1e293b"/>
  <!-- day block -->
  <text x="100" y="176" text-anchor="middle" font-size="12" font-weight="700" fill="#fde68a">수면 😴</text>
  <text x="400" y="176" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">활동 (낮)</text>
  <text x="690" y="176" text-anchor="middle" font-size="12" font-weight="700" fill="#fde68a">수면 😴</text>

  <!-- hour marks -->
  <text x="40" y="212" text-anchor="middle" font-size="11" fill="#64748b">밤 11시</text>
  <text x="160" y="212" text-anchor="middle" font-size="11" fill="#64748b">6시</text>
  <text x="400" y="212" text-anchor="middle" font-size="11" fill="#64748b">낮</text>
  <text x="640" y="212" text-anchor="middle" font-size="11" fill="#64748b">밤 11시</text>

  <!-- morning routine -->
  <rect x="90" y="245" width="230" height="110" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="205" y="270" text-anchor="middle" font-size="14" font-weight="700" fill="#c2410c">☀️ 기상 루틴 (6시)</text>
  <text x="205" y="296" text-anchor="middle" font-size="12" fill="#9a3412">• 햇빛 쬐기 (가장 중요)</text>
  <text x="205" y="318" text-anchor="middle" font-size="12" fill="#9a3412">• 점프 운동</text>
  <text x="205" y="340" text-anchor="middle" font-size="12" fill="#9a3412">• hot sauce</text>
  <path d="M120 190 L160 243" stroke="#f97316" stroke-width="2" fill="none" marker-end="url(#ao)"/>

  <!-- nap -->
  <rect x="335" y="270" width="110" height="60" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="390" y="295" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">낮잠</text>
  <text x="390" y="317" text-anchor="middle" font-size="11" fill="#475569">25분 미만</text>

  <!-- night routine -->
  <rect x="460" y="245" width="230" height="110" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="575" y="270" text-anchor="middle" font-size="14" font-weight="700" fill="#7e22ce">🌙 취침 루틴 (11시)</text>
  <text x="575" y="296" text-anchor="middle" font-size="12" fill="#6b21a8">• 안대 필수 (빛 차단)</text>
  <text x="575" y="318" text-anchor="middle" font-size="12" fill="#6b21a8">• 정자세로 릴렉스</text>
  <text x="575" y="340" text-anchor="middle" font-size="12" fill="#dc2626">• 야식 절대 금지</text>
  <path d="M660 190 L620 243" stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#ap)"/>

  <defs>
    <marker id="ao" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#f97316"/></marker>
    <marker id="ap" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#a855f7"/></marker>
  </defs>
</svg>
