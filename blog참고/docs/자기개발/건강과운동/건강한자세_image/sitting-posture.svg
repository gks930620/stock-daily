<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 440" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="440" fill="#f8fafc"/>
  <text x="390" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">올바른 앉기 자세 (옆에서 본 모습)</text>

  <!-- GOOD -->
  <rect x="30" y="60" width="345" height="350" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="202" y="88" text-anchor="middle" font-size="16" font-weight="700" fill="#15803d">⭕ 바른 자세</text>

  <!-- floor & chair -->
  <line x1="60" y1="360" x2="345" y2="360" stroke="#94a3b8" stroke-width="2"/>
  <rect x="130" y="270" width="90" height="12" fill="#cbd5e1"/> <!-- seat -->
  <line x1="220" y1="200" x2="220" y2="282" stroke="#cbd5e1" stroke-width="6"/> <!-- backrest -->

  <!-- body: aligned spine -->
  <line x1="175" y1="278" x2="175" y2="200" stroke="#16a34a" stroke-width="6" stroke-linecap="round"/> <!-- torso straight -->
  <circle cx="175" cy="178" r="20" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/> <!-- head aligned -->
  <line x1="175" y1="278" x2="135" y2="278" stroke="#16a34a" stroke-width="6" stroke-linecap="round"/> <!-- thigh -->
  <line x1="135" y1="278" x2="135" y2="358" stroke="#16a34a" stroke-width="6" stroke-linecap="round"/> <!-- shin -->
  <line x1="135" y1="358" x2="160" y2="358" stroke="#16a34a" stroke-width="7" stroke-linecap="round"/> <!-- foot flat -->

  <!-- vertical reference line -->
  <line x1="175" y1="150" x2="175" y2="300" stroke="#22c55e" stroke-width="1" stroke-dasharray="4 3"/>

  <text x="255" y="180" font-size="11" fill="#166534">턱 살짝 당기고</text>
  <text x="255" y="196" font-size="11" fill="#166534">목·머리 정렬</text>
  <text x="255" y="238" font-size="11" fill="#166534">등 펴고</text>
  <text x="255" y="254" font-size="11" fill="#166534">배 당김</text>
  <text x="250" y="352" font-size="11" fill="#166534">발바닥 전체가</text>
  <text x="250" y="368" font-size="11" fill="#166534">바닥에 닿기</text>

  <!-- BAD -->
  <rect x="405" y="60" width="345" height="350" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="577" y="88" text-anchor="middle" font-size="16" font-weight="700" fill="#b91c1c">❌ 구부정한 자세</text>

  <line x1="435" y1="360" x2="720" y2="360" stroke="#94a3b8" stroke-width="2"/>
  <rect x="505" y="270" width="90" height="12" fill="#cbd5e1"/>
  <line x1="595" y1="200" x2="595" y2="282" stroke="#cbd5e1" stroke-width="6"/>

  <!-- slouched spine (curved) -->
  <path d="M550 278 Q 545 230 560 205" stroke="#dc2626" stroke-width="6" fill="none" stroke-linecap="round"/> <!-- rounded back -->
  <line x1="560" y1="205" x2="600" y2="188" stroke="#dc2626" stroke-width="6" stroke-linecap="round"/> <!-- neck forward -->
  <circle cx="612" cy="182" r="20" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/> <!-- head forward -->
  <line x1="550" y1="278" x2="510" y2="278" stroke="#dc2626" stroke-width="6" stroke-linecap="round"/>
  <line x1="510" y1="278" x2="510" y2="358" stroke="#dc2626" stroke-width="6" stroke-linecap="round"/>
  <line x1="510" y1="358" x2="535" y2="358" stroke="#dc2626" stroke-width="7" stroke-linecap="round"/>

  <!-- reference -->
  <line x1="550" y1="150" x2="550" y2="300" stroke="#ef4444" stroke-width="1" stroke-dasharray="4 3"/>

  <text x="632" y="180" font-size="11" fill="#991b1b">머리가 앞으로</text>
  <text x="632" y="196" font-size="11" fill="#991b1b">(거북목)</text>
  <text x="500" y="240" font-size="11" fill="#991b1b">등이 굽음</text>
  <text x="480" y="330" font-size="10" fill="#991b1b">장기 눌림 → 소화불량·변비</text>

  <text x="390" y="428" text-anchor="middle" font-size="12" fill="#64748b">보조기구에 의존하지 말고, 내 힘으로 정렬을 유지해 몸이 기억하게 한다</text>
</svg>
