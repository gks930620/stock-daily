<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 300" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="300" fill="#f8fafc"/>
  <text x="390" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">주간 영어 루틴</text>
  <text x="390" y="56" text-anchor="middle" font-size="13" fill="#64748b">회화(월·금·토)와 번역(화·목)을 요일로 나눠 꾸준히</text>

  <!-- days -->
  <g font-size="14" font-weight="700">
    <rect x="30" y="80" width="100" height="46" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/><text x="80" y="109" text-anchor="middle" fill="#1d4ed8">월</text>
    <rect x="138" y="80" width="100" height="46" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/><text x="188" y="109" text-anchor="middle" fill="#15803d">화</text>
    <rect x="246" y="80" width="100" height="46" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="296" y="109" text-anchor="middle" fill="#94a3b8">수</text>
    <rect x="354" y="80" width="100" height="46" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/><text x="404" y="109" text-anchor="middle" fill="#15803d">목</text>
    <rect x="462" y="80" width="100" height="46" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/><text x="512" y="109" text-anchor="middle" fill="#1d4ed8">금</text>
    <rect x="570" y="80" width="100" height="46" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/><text x="620" y="109" text-anchor="middle" fill="#1d4ed8">토</text>
    <rect x="678" y="80" width="72" height="46" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/><text x="714" y="109" text-anchor="middle" fill="#94a3b8">일</text>
  </g>

  <!-- 회화 label bar (월금토) -->
  <rect x="30" y="150" width="100" height="40" rx="6" fill="#dbeafe"/><text x="80" y="175" text-anchor="middle" font-size="11" fill="#1e3a8a">회화</text>
  <rect x="462" y="150" width="208" height="40" rx="6" fill="#dbeafe"/><text x="566" y="175" text-anchor="middle" font-size="11" fill="#1e3a8a">회화</text>
  <text x="35" y="210" font-size="12" font-weight="700" fill="#1d4ed8">🗣 회화 (월·금·토)</text>
  <text x="35" y="230" font-size="11" fill="#475569">구슬쌤 강의 → 말하며 듣기 → 통문장 sticky 메모 → 복습</text>
  <text x="35" y="248" font-size="11" fill="#475569">sticky 5일↑ 쌓이면 스프레드시트로 이동 → 복습 전용일 만들기</text>

  <!-- 번역 label bar (화목) -->
  <rect x="138" y="150" width="100" height="40" rx="6" fill="#dcfce7"/><text x="188" y="175" text-anchor="middle" font-size="11" fill="#166534">번역</text>
  <rect x="354" y="150" width="100" height="40" rx="6" fill="#dcfce7"/><text x="404" y="175" text-anchor="middle" font-size="11" fill="#166534">번역</text>
  <text x="420" y="266" text-anchor="start" font-size="11" fill="#15803d"> </text>
  <text x="35" y="278" font-size="12" font-weight="700" fill="#15803d">✍ 번역 (화·목): 영-한 스크립트 만들고 → 내가 한→영 번역 → 원문과 비교</text>
</svg>
