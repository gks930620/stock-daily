<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="400" fill="#f8fafc"/>
  <text x="390" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">큰 틀 → 작은 틀 (도식화 · 마인드맵)</text>
  <text x="390" y="56" text-anchor="middle" font-size="13" fill="#64748b">전체 구조를 먼저 잡고, 가지를 뻗어 세부로 내려간다 (예: OSI 7계층)</text>

  <!-- root -->
  <rect x="310" y="80" width="160" height="46" rx="10" fill="#1e293b"/>
  <text x="390" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">OSI 7계층</text>

  <!-- level nodes -->
  <rect x="70" y="180" width="160" height="44" rx="9" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="150" y="207" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">1계층 (물리)</text>

  <rect x="310" y="180" width="160" height="44" rx="9" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="390" y="207" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">…</text>

  <rect x="550" y="180" width="160" height="44" rx="9" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="630" y="207" text-anchor="middle" font-size="13" font-weight="700" fill="#7e22ce">5계층 (세션)</text>

  <path d="M360 128 C 280 150, 200 160, 150 178" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M390 128 L390 178" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M420 128 C 500 150, 580 160, 630 178" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#a)"/>

  <!-- leaf detail under 세션 -->
  <rect x="530" y="270" width="200" height="44" rx="9" fill="#f3e8ff" stroke="#c084fc"/>
  <text x="630" y="290" text-anchor="middle" font-size="11" fill="#6b21a8">세션 계층 = 세션 관리</text>
  <text x="630" y="306" text-anchor="middle" font-size="10" fill="#94a3b8">(당연한 건 가볍게, 키워드 중심)</text>
  <path d="M630 224 L630 268" stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#ap)"/>

  <rect x="70" y="270" width="160" height="44" rx="9" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="150" y="290" text-anchor="middle" font-size="11" fill="#1e3a8a">물리 계층 세부…</text>
  <text x="150" y="306" text-anchor="middle" font-size="10" fill="#94a3b8">또 큰틀→작은틀로 쪼갬</text>
  <path d="M150 224 L150 268" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#ab)"/>

  <text x="390" y="356" text-anchor="middle" font-size="12" fill="#334155">이렇게 도식화한 뒤, 마지막엔 반드시 빈 종이에 output + 설명으로 복습</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#94a3b8"/></marker>
    <marker id="ab" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#3b82f6"/></marker>
    <marker id="ap" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#a855f7"/></marker>
  </defs>
</svg>
