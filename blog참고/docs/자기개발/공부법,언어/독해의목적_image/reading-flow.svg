<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 260" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="260" fill="#f8fafc"/>
  <text x="390" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">독해의 흐름 — 목표는 "직관"</text>
  <text x="390" y="56" text-anchor="middle" font-size="13" fill="#64748b">읽은 내용을 매번 "내 문장"으로 바꾸는 훈련</text>

  <!-- pipeline -->
  <rect x="30" y="95" width="120" height="60" rx="10" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="90" y="130" text-anchor="middle" font-size="13" fill="#334155">발음</text>

  <rect x="180" y="95" width="120" height="60" rx="10" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="240" y="130" text-anchor="middle" font-size="13" fill="#1d4ed8">단어</text>

  <rect x="330" y="95" width="120" height="60" rx="10" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="390" y="130" text-anchor="middle" font-size="13" fill="#15803d">문장</text>

  <rect x="480" y="95" width="120" height="60" rx="10" fill="#fff7ed" stroke="#f97316"/>
  <text x="540" y="123" text-anchor="middle" font-size="13" fill="#c2410c">필자 의도</text>

  <rect x="630" y="88" width="130" height="74" rx="10" fill="#a855f7"/>
  <text x="695" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">직관</text>
  <text x="695" y="140" text-anchor="middle" font-size="10" fill="#f3e8ff">나만의 쉬운 문장</text>

  <path d="M152 125 L178 125" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
  <path d="M302 125 L328 125" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
  <path d="M452 125 L478 125" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
  <path d="M602 125 L628 125" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#a)"/>

  <text x="390" y="205" text-anchor="middle" font-size="12" fill="#334155">문장을 완성하는 것 = 사고 정리 완료 → 글을 쓰는 것만으로 사고력이 오른다</text>
  <text x="390" y="230" text-anchor="middle" font-size="11" fill="#94a3b8">독해뿐 아니라 유튜브 영상도 같은 방식으로 "내 문장"으로 정리</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#64748b"/></marker>
  </defs>
</svg>
