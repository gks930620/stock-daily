<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="780" height="400" fill="#f8fafc"/>
  <text x="390" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">암기 vs 기억 — 잊어도 반복하면 기억된다</text>
  <text x="390" y="56" text-anchor="middle" font-size="13" fill="#64748b">"상위권은 기억하고, 하위권은 암기하려 한다"</text>

  <!-- BAD: 억지 암기 -->
  <rect x="40" y="90" width="280" height="250" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="180" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#b91c1c">❌ 억지 암기</text>
  <rect x="80" y="140" width="200" height="44" rx="8" fill="#fee2e2"/>
  <text x="180" y="167" text-anchor="middle" font-size="12" fill="#991b1b">1~2번에 완벽하게!</text>
  <path d="M180 186 L180 210" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <rect x="80" y="212" width="200" height="44" rx="8" fill="#fee2e2"/>
  <text x="180" y="239" text-anchor="middle" font-size="12" fill="#991b1b">스트레스만 쌓임</text>
  <path d="M180 258 L180 282" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <rect x="80" y="284" width="200" height="44" rx="8" fill="#fecaca"/>
  <text x="180" y="311" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">잘 안 외워짐</text>

  <!-- GOOD: 기억 사이클 -->
  <rect x="360" y="90" width="380" height="250" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="550" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">⭕ 기억 = 반복 사이클</text>

  <!-- cycle nodes -->
  <rect x="470" y="135" width="160" height="40" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="550" y="160" text-anchor="middle" font-size="12" fill="#166534">이해하고 머리에 넣기</text>

  <rect x="600" y="215" width="120" height="40" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="660" y="240" text-anchor="middle" font-size="12" fill="#166534">잊어버림</text>

  <rect x="470" y="285" width="160" height="40" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="550" y="310" text-anchor="middle" font-size="12" fill="#166534">다시 보고 이해</text>

  <rect x="380" y="215" width="120" height="40" rx="8" fill="#bbf7d0" stroke="#16a34a"/>
  <text x="440" y="235" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">반복</text>
  <text x="440" y="250" text-anchor="middle" font-size="10" fill="#15803d">= 기억</text>

  <!-- cycle arrows -->
  <path d="M625 172 C 680 185, 690 195, 680 213" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <path d="M655 257 C 640 285, 620 288, 605 293" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <path d="M495 300 C 450 295, 435 275, 438 258" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <path d="M475 220 C 450 195, 480 180, 510 175" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#ag)"/>

  <text x="550" y="358" text-anchor="middle" font-size="11" fill="#15803d">등굣길·노래 가사처럼 — 잊어도 좋다! 반복하면 저절로 기억된다</text>

  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#ef4444"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#16a34a"/></marker>
  </defs>
</svg>
