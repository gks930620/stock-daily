<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="800" height="430" fill="#f8fafc"/>
  <text x="400" y="34" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">동작 구조 — 서버/DB 없이 IDE 내부에서 데이터 기반으로</text>

  <!-- IDE boundary -->
  <rect x="25" y="60" width="750" height="290" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="2" stroke-dasharray="7 4"/>
  <text x="45" y="84" font-size="13" font-weight="700" fill="#4338ca">IntelliJ IDE 내부 (외부 서버·네트워크 의존 없음)</text>

  <!-- index.txt -->
  <rect x="55" y="110" width="160" height="90" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="135" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">templates/index.txt</text>
  <text x="135" y="160" text-anchor="middle" font-size="11" fill="#9a3412">단일 소스 (Single Source)</text>
  <text x="135" y="180" text-anchor="middle" font-size="11" fill="#9a3412">템플릿 파일명 목록</text>

  <!-- ProblemRepository -->
  <rect x="270" y="110" width="160" height="90" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">ProblemRepository</text>
  <text x="350" y="160" text-anchor="middle" font-size="11" fill="#475569">인덱스 파싱 · 정규화</text>
  <text x="350" y="180" text-anchor="middle" font-size="11" fill="#475569">언어/제목 정렬·필터</text>

  <!-- Problem model -->
  <rect x="485" y="110" width="160" height="90" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="565" y="136" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">Problem 모델</text>
  <text x="565" y="158" text-anchor="middle" font-size="10" font-family="monospace" fill="#166534">language</text>
  <text x="565" y="174" text-anchor="middle" font-size="10" font-family="monospace" fill="#166534">templateFile</text>
  <text x="565" y="190" text-anchor="middle" font-size="10" font-family="monospace" fill="#166534">resourcePath</text>

  <!-- Tool Window -->
  <rect x="270" y="245" width="375" height="85" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="457" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#7e22ce">Tool Window UI</text>
  <text x="457" y="292" text-anchor="middle" font-size="11" fill="#475569">좌: 검색·언어 필터·문제 리스트   /   우: 템플릿 미리보기</text>
  <text x="457" y="312" text-anchor="middle" font-size="11" fill="#475569">문제 선택 → 즉시 프리뷰 갱신</text>

  <!-- arrows -->
  <path d="M217 155 L268 155" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
  <text x="242" y="147" text-anchor="middle" font-size="10" fill="#64748b">읽기</text>
  <path d="M432 155 L483 155" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
  <text x="457" y="147" text-anchor="middle" font-size="10" fill="#64748b">정규화</text>
  <path d="M400 202 L440 243" stroke="#a855f7" stroke-width="2.5" fill="none" marker-end="url(#ap)"/>
  <path d="M540 202 L490 243" stroke="#a855f7" stroke-width="2.5" fill="none" marker-end="url(#ap)"/>

  <!-- outputs -->
  <rect x="660" y="248" width="120" height="38" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="720" y="272" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">파일 생성</text>
  <rect x="660" y="292" width="120" height="38" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="720" y="316" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">클립보드 복사</text>
  <path d="M647 275 L658 270" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <path d="M647 300 L658 306" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#ab)"/>

  <text x="720" y="230" text-anchor="middle" font-size="10" fill="#94a3b8">WriteCommandAction</text>

  <text x="400" y="378" text-anchor="middle" font-size="12" fill="#64748b">데이터(템플릿 목록)를 코드에서 분리 → 템플릿 548개도 하드코딩 없이 관리·확장</text>
  <text x="400" y="400" text-anchor="middle" font-size="11" fill="#94a3b8">설치 즉시 사용 · 운영 부담 0 · UTF-8 고정으로 한글 파일명 안전 처리</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#64748b"/></marker>
    <marker id="ap" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#a855f7"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#22c55e"/></marker>
    <marker id="ab" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#3b82f6"/></marker>
  </defs>
</svg>
