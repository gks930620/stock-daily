name: 시장 예상 (cloud)

# GitHub 서버에서 하루 2회, "장이 열려 있는 동안" 자동 실행 (내 PC 불필요).
#   14:00 KST 시작 (05:00 UTC)  → 🇰🇷 리포트·체결 ~15:00 KST  → 독자는 15:00~15:30(마감 전) 매수 가능
#   22:40 KST 시작 (13:40 UTC)  → 🇺🇸 리포트·체결 ~23:40 KST  → 독자는 그 자리에서 매수 가능
#
# 목표: **리포트를 본 사람이 30분 안에 같은 가격대로 실제 매수할 수 있어야 한다.**
#   그래서 장중에 발행하고, AI 판단이 끝난 뒤 시세를 "다시 수집"해 그 시장가로 체결한다
#   (AI가 못 본 가격 = 룩어헤드 없음, 동시에 독자가 실제로 살 수 있는 가격).
# ⚠️ 미장 시각은 서머타임(EDT) 기준. 겨울(EST, 11~3월)엔 미 개장이 1시간 늦어지므로 us 크론을 +1시간.
#
# 과금: Claude는 CLAUDE_CODE_OAUTH_TOKEN(내 Max 구독 토큰)으로만 인증 → Max 플랜 사용량에서 차감.
#      ⚠️ ANTHROPIC_API_KEY 는 절대 설정하지 않는다 (설정하면 API 토큰당 과금됨).

permissions:
  contents: write

on:
  schedule:
    - cron: "0 5 * * 1-5"    # 14:00 KST 평일 시작 → kr 리포트 ~15:00 (장중)
    - cron: "40 13 * * 1-5"  # 22:40 KST 평일 시작 → us 리포트 ~23:40 (장중, EDT 기준)
  workflow_dispatch:
    inputs:
      mode:
        description: "실행 모드 (장중 실행)"
        type: choice
        options: [kr, us]
        default: kr

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 모드 결정
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.mode }}"
          else
            H=$(date -u +%H)
            case "$H" in
              04|05|06) MODE=kr ;;   # 14:00 KST 부근 (한국장 장중)
              13|14|15) MODE=us ;;   # 22:40 KST 부근 (미국장 장중)
              *) MODE=kr ;;
            esac
          fi
          LABEL=$MODE
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "▶ 모드: $MODE (라벨: $LABEL)"

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 파이썬 패키지 설치
        run: pip install -r requirements.txt

      - name: 데이터 수집 (시세·경제지표)
        run: python scripts/collect_data.py ${{ steps.mode.outputs.label }}

      - name: 한글 폰트 설치 (차트용)
        run: sudo apt-get update && sudo apt-get install -y fonts-nanum && fc-cache -f

      - name: 차트 생성
        run: python scripts/make_charts.py

      - name: 비인기종목 스크리너 (한국장 예상글 전용)
        if: steps.mode.outputs.mode == 'kr'
        run: python scripts/screener.py || echo "screener 실패(계속 진행)"
        continue-on-error: true

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Claude Code 설치
        run: npm install -g @anthropic-ai/claude-code

      # 1단계 🧑‍💼 성향별 포트폴리오 매니저 3인 (각자 독립 세션·독립 계좌)이 먼저 종목을 정한다.
      #    데이터를 직접 보고 성향(안정/공격/역발상)대로 "이 종목 매수/매도"를 명확히 → 3개의 주문서.
      #    비용 관리를 위해 매니저는 effort=high (애널리스트는 xhigh). 필요시 조절 가능.
      - name: Claude 포트폴리오 매매 결정 × 3인 (먼저 실행 — 종목 확정)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          MODE=${{ steps.mode.outputs.mode }}
          REPORT_DATE=$(TZ='Asia/Seoul' date +%Y-%m-%d)
          claude --version
          for P in stable aggressive contrarian; do
            echo "───── 포트폴리오 매니저: $P ─────"
            PROMPT="$(cat prompts/persona-$P.md prompts/portfolio.md)

          [실행 안내]
          - 오늘 날짜(KST): ${REPORT_DATE}
          - 이번 세션: ${MODE} / 너의 성향 id: ${P}
          - 주문서 파일명은 반드시 portfolio/orders/${REPORT_DATE}-${MODE}-${P}.json
          - 네 계좌 파일: _data/portfolio-${P}.json (없으면 현금 1억 시작)
          - 너는 1차 결정자다. 데이터를 직접 보고 종목을 정하라 (애널리스트 리포트는 아직 없다).
          - git 금지. 주문서 JSON 파일 생성까지만."
            claude -p "$PROMPT" --model opus --effort high --permission-mode bypassPermissions --verbose
          done

      # 2단계 🧠 애널리스트가 3인의 주문서를 종합해 "오늘의 매수/매도 종목"을 깔끔하게 정리한다.
      - name: Claude 종합 리포트 생성 (3인 주문 종합 — 종목 결론)
        env:
          # 구독(Max) 토큰만 사용. API 키는 넣지 않음 → Max 사용량으로 차감.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          MODE=${{ steps.mode.outputs.mode }}
          REPORT_DATE=$(TZ='Asia/Seoul' date +%Y-%m-%d)
          REPORT_TIME=$(TZ='Asia/Seoul' date +%H:%M)
          YESTERDAY=$(TZ='Asia/Seoul' date -d 'yesterday' +%Y-%m-%d)
          PROMPT="$(cat prompts/${MODE}-report.md)

          [CI 환경 안내]
          - 오늘 날짜(KST): ${REPORT_DATE} / 어제: ${YESTERDAY}
          - **지금 시각(KST): ${REPORT_TIME}** → front matter의 date를 반드시 \`${REPORT_DATE} ${REPORT_TIME}:00 +0900\` 로 쓸 것 (실제 작성 시각).
          - 방금 3인이 낸 주문서: portfolio/orders/${REPORT_DATE}-${MODE}-{stable,aggressive,contrarian}.json 를 반드시 읽어 종합하라.
          - git 명령은 직접 실행하지 마라. 파일 생성까지만 하면 커밋·push는 워크플로가 처리한다."
          # --model opus: 항상 최신 Opus / --effort xhigh: 최고 심층추론
          claude -p "$PROMPT" --model opus --effort xhigh --permission-mode bypassPermissions --verbose

      # 🔑 AI 판단이 끝난 "지금"의 시세를 다시 수집 → 이 가격으로 체결한다.
      #    AI가 못 본 가격이라 룩어헤드가 없고, 동시에 리포트를 본 독자가 실제로 살 수 있는 가격이다.
      - name: 리포트 시점 시세 재수집 (체결가 확정용)
        run: python scripts/collect_data.py ${{ steps.mode.outputs.label }}-fill

      - name: 가상 포트폴리오 체결·평가 × 3인 (리포트 시점 시장가로 체결)
        run: |
          for P in stable aggressive contrarian; do
            echo "───── 체결·평가: $P ─────"
            python scripts/portfolio.py ${{ steps.mode.outputs.label }} $P
          done

      - name: 커밋 & 푸시
        run: |
          git config user.name "stock-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add -A
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "auto(${{ steps.mode.outputs.mode }}): $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M')"
            git push
          fi
