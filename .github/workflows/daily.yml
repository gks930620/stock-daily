name: 시장 예상 (cloud)

# GitHub 서버에서 하루 2회, "장이 열려 있는 동안" 자동 실행 (내 PC 불필요).
#
#   📌 발행 시각 고정 (독자가 언제 볼지 알아야 하므로):
#      🇰🇷 매일 14:30 분석 시작 → **~14:45 리포트·체결** → 독자는 15:30 마감 전까지 매수
#      🇺🇸 매일 23:30 분석 시작 → **~23:45 리포트·체결** → 독자는 장중 바로 매수
#
#   ⚠️ GitHub 예약실행은 큐 지연으로 20~45분 늦게 시작한다(정상 동작).
#      그래서 크론을 일찍 걸고, 아래 "목표 시각까지 대기" 스텝이 정확한 시각에 시작시킨다.
#      → 발행 시각이 매일 같아진다. (지연이 목표 시각을 넘겼으면 즉시 실행)
#      실제 파이프라인 소요는 ~11~16분 (AI 4명 포함).
#
# 원칙: **리포트를 본 사람이 30분 안에 같은 가격대로 실제 매수할 수 있어야 한다.**
#   장중에 발행하고, AI 판단이 끝난 뒤 시세를 "다시 수집"해 그 시장가로 체결한다
#   (AI가 못 본 가격 = 룩어헤드 없음, 동시에 독자가 실제로 살 수 있는 가격).
# 🇺🇸 23:30 시작은 서머타임/겨울 모두 미장 개장 후라 연중 안전 (여름 22:30 개장 · 겨울 23:30 개장).
#
# 과금: Claude는 CLAUDE_CODE_OAUTH_TOKEN(내 Max 구독 토큰)으로만 인증 → Max 플랜 사용량에서 차감.
#      ⚠️ ANTHROPIC_API_KEY 는 절대 설정하지 않는다 (설정하면 API 토큰당 과금됨).

permissions:
  contents: write

on:
  schedule:
    # ⚠️ GitHub 예약실행은 최대 2~3시간까지 지연될 수 있다(실측: 크론+2h20m).
    #    그래서 목표(14:30/23:30)보다 ~3.5h 일찍 걸어, 지연이 있어도 목표 '전'에 시작되게 한다.
    #    실제 시작은 아래 "목표 시각까지 대기" 스텝이 정확히 맞춘다.
    - cron: "0 2 * * 1-5"    # 11:00 KST 크론 → (지연 흡수) → 14:30 시작 → 🇰🇷 리포트 ~14:45
    - cron: "0 11 * * 1-5"   # 20:00 KST 크론 → (지연 흡수) → 23:30 시작 → 🇺🇸 리포트 ~23:45
  workflow_dispatch:
    inputs:
      mode:
        description: "실행 모드 (장중 실행)"
        type: choice
        options: [kr, us]
        default: kr

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 모드 결정
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.mode }}"
          else
            # 크론: kr=02 UTC, us=11 UTC. 지연(최대 ~4h)까지 감안해도 두 구간은 안 겹친다.
            H=$(( 10#$(date -u +%H) ))
            if [ "$H" -lt 9 ]; then MODE=kr; else MODE=us; fi   # 02~08 UTC=kr / 11~16 UTC=us
          fi
          case "$MODE" in
            kr) TARGET=14:30 ;;      # → 리포트 ~14:45 (마감 15:30 전)
            us) TARGET=23:30 ;;      # → 리포트 ~23:45 (연중 미장 개장 후)
          esac
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "label=$MODE" >> "$GITHUB_OUTPUT"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "▶ 모드: $MODE · 목표 시작 $TARGET KST (현재 $(TZ='Asia/Seoul' date +%H:%M))"

      # GitHub 크론 지연을 흡수해 **매일 같은 시각(목표)에 발행**되도록 목표 시각까지 대기.
      # epoch(초)로 계산 → 자정을 넘겨도 안전. 목표를 이미 지났거나 6h 넘게 남았으면 대기 없이 진행.
      - name: 목표 시각까지 대기 (발행 시각 고정)
        run: |
          TARGET="${{ steps.mode.outputs.target }}"                 # 예: 14:30 (KST)
          TE=$(TZ='Asia/Seoul' date -d "$TARGET" +%s)               # 오늘 그 시각의 epoch
          W=$(( TE - $(date +%s) ))
          if [ "$W" -gt 0 ] && [ "$W" -le 21600 ]; then
            echo "▶ 목표 $TARGET KST 까지 $((W/60))분 대기 (현재 $(TZ='Asia/Seoul' date +%H:%M))"
            sleep "$W"
          else
            echo "▶ 대기 없음 (현재 $(TZ='Asia/Seoul' date +%H:%M) KST · 남은 ${W}s — 목표 지났거나 범위 밖)"
          fi
          echo "▶ $(TZ='Asia/Seoul' date +%H:%M) KST — 분석 시작"

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 파이썬 패키지 설치
        run: pip install -r requirements.txt

      - name: 데이터 수집 (시세·경제지표)
        run: python scripts/collect_data.py ${{ steps.mode.outputs.label }}

      - name: 한글 폰트 설치 (차트용)
        run: sudo apt-get update && sudo apt-get install -y fonts-nanum && fc-cache -f

      - name: 차트 생성
        run: python scripts/make_charts.py

      - name: 비인기종목 스크리너 (한국장 예상글 전용)
        if: steps.mode.outputs.mode == 'kr'
        run: python scripts/screener.py || echo "screener 실패(계속 진행)"
        continue-on-error: true

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Claude Code 설치
        run: npm install -g @anthropic-ai/claude-code

      # 1단계 🧑‍💼 성향별 포트폴리오 매니저 3인 (각자 독립 세션·독립 계좌)이 먼저 종목을 정한다.
      #    데이터를 직접 보고 성향(안정/공격/역발상)대로 "이 종목 매수/매도"를 명확히 → 3개의 주문서.
      #    비용 관리를 위해 매니저는 effort=high (애널리스트는 xhigh). 필요시 조절 가능.
      - name: Claude 포트폴리오 매매 결정 × 3인 (먼저 실행 — 종목 확정)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          MODE=${{ steps.mode.outputs.mode }}
          REPORT_DATE=$(TZ='Asia/Seoul' date +%Y-%m-%d)
          claude --version
          for P in stable aggressive contrarian; do
            echo "───── 포트폴리오 매니저: $P ─────"
            PROMPT="$(cat prompts/persona-$P.md prompts/portfolio.md)

          [실행 안내]
          - 오늘 날짜(KST): ${REPORT_DATE}
          - 이번 세션: ${MODE} / 너의 성향 id: ${P}
          - 주문서 파일명은 반드시 portfolio/orders/${REPORT_DATE}-${MODE}-${P}.json
          - 네 계좌 파일: _data/portfolio-${P}.json (없으면 현금 1억 시작)
          - 너는 1차 결정자다. 데이터를 직접 보고 종목을 정하라 (애널리스트 리포트는 아직 없다).
          - git 금지. 주문서 JSON 파일 생성까지만."
            claude -p "$PROMPT" --model opus --effort high --permission-mode bypassPermissions --verbose
          done

      # 2단계 🧠 애널리스트가 3인의 주문서를 종합해 "오늘의 매수/매도 종목"을 깔끔하게 정리한다.
      - name: Claude 종합 리포트 생성 (3인 주문 종합 — 종목 결론)
        env:
          # 구독(Max) 토큰만 사용. API 키는 넣지 않음 → Max 사용량으로 차감.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          MODE=${{ steps.mode.outputs.mode }}
          REPORT_DATE=$(TZ='Asia/Seoul' date +%Y-%m-%d)
          REPORT_TIME=$(TZ='Asia/Seoul' date +%H:%M)
          YESTERDAY=$(TZ='Asia/Seoul' date -d 'yesterday' +%Y-%m-%d)
          PROMPT="$(cat prompts/${MODE}-report.md)

          [CI 환경 안내]
          - 오늘 날짜(KST): ${REPORT_DATE} / 어제: ${YESTERDAY}
          - **지금 시각(KST): ${REPORT_TIME}** → front matter의 date를 반드시 \`${REPORT_DATE} ${REPORT_TIME}:00 +0900\` 로 쓸 것 (실제 작성 시각).
          - 방금 3인이 낸 주문서: portfolio/orders/${REPORT_DATE}-${MODE}-{stable,aggressive,contrarian}.json 를 반드시 읽어 종합하라.
          - git 명령은 직접 실행하지 마라. 파일 생성까지만 하면 커밋·push는 워크플로가 처리한다."
          # --model opus: 항상 최신 Opus / --effort xhigh: 최고 심층추론
          claude -p "$PROMPT" --model opus --effort xhigh --permission-mode bypassPermissions --verbose

      # 체결가 = AI가 분석한 바로 그 시세(market.json). 가격을 보고 판단했으니 그 가격에 산다.
      # 룩어헤드 아님: 수익은 이 시점 '이후' 가격에서 나오고, AI는 그걸 볼 수 없다.
      - name: 가상 포트폴리오 체결·평가 × 3인 (AI가 본 시세로 체결)
        run: |
          for P in stable aggressive contrarian; do
            echo "───── 체결·평가: $P ─────"
            python scripts/portfolio.py ${{ steps.mode.outputs.label }} $P
          done

      - name: 커밋 & 푸시
        run: |
          git config user.name "stock-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add -A
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "auto(${{ steps.mode.outputs.mode }}): $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M')"
            git push
          fi
