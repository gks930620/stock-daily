name: 매일 주식 리포트 (cloud)

# GitHub 서버에서 매일 자동 실행 (내 PC 불필요).
# 과금: Claude는 CLAUDE_CODE_OAUTH_TOKEN(내 Max 구독 토큰)으로만 인증 → Max 플랜 사용량에서 차감.
#      ⚠️ ANTHROPIC_API_KEY 는 절대 설정하지 않는다 (설정하면 API 토큰당 과금됨).

permissions:
  contents: write        # git commit/push 하려면 필요

on:
  schedule:
    - cron: "0 23 * * *"   # 08:00 KST (UTC+9) = 전날 23:00 UTC
  workflow_dispatch: {}    # Actions 탭에서 수동 실행 버튼

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 파이썬 패키지 설치
        run: pip install -r requirements.txt

      - name: 데이터 수집 (시세·경제지표)
        run: python scripts/collect_data.py

      - name: 차트 생성
        run: python scripts/make_charts.py

      - name: 비인기종목 스크리너 (해외서버라 실패 가능 → 실패해도 계속)
        run: python scripts/screener.py || echo "screener 실패(계속 진행)"
        continue-on-error: true

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Claude Code 설치
        run: npm install -g @anthropic-ai/claude-code

      - name: Claude 분석·리포트 생성
        env:
          # 구독(Max) 토큰만 사용. API 키는 넣지 않음 → Max 사용량으로 차감.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          REPORT_DATE=$(TZ='Asia/Seoul' date +%Y-%m-%d)
          PROMPT="$(cat prompts/daily-report.md)

          [CI 환경 안내]
          - 오늘 날짜(KST)는 ${REPORT_DATE} 이다. data/${REPORT_DATE}/ 와 assets/charts/${REPORT_DATE}/ 를 사용하라.
          - git 명령은 직접 실행하지 마라. _posts/${REPORT_DATE}-market-report.md 파일만 생성하면, 커밋·push는 워크플로가 처리한다."
          claude -p "$PROMPT" \
            --allowedTools "Read,Write,Edit,Glob,Grep,WebSearch,WebFetch" \
            --max-turns 40

      - name: 커밋 & 푸시
        run: |
          git config user.name "stock-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "report: $(TZ='Asia/Seoul' date +%Y-%m-%d) (GitHub Actions 자동 생성)"
            git push
          fi
