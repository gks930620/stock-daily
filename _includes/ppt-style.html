<style>
.ppt{--buy:#d63c2f;--sell:#2563d0;max-width:860px;margin:0 auto;}
.ppt .note{font-size:13px;color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 13px;margin-bottom:16px;}
.ppt .mut{color:var(--muted);font-weight:400;}
.ppt .slide{position:relative;background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:34px 36px;margin-bottom:18px;min-height:320px;display:flex;flex-direction:column;justify-content:center;}
.ppt .pg{position:absolute;top:18px;right:22px;font-size:12px;font-weight:800;letter-spacing:.12em;color:var(--muted);opacity:.7;}
.ppt .slide h2{font-size:clamp(20px,3.4vw,26px);margin:0 0 20px;letter-spacing:-.01em;border:none;padding:0;}
.ppt .lead{font-size:16px;line-height:1.65;color:var(--text);margin:18px 0 0;}
.ppt .lead b{font-weight:800;}
.ppt .cover{min-height:420px;}
.ppt .kick{font-size:13px;font-weight:800;letter-spacing:.18em;color:var(--link);}
.ppt .cover h1{font-size:clamp(34px,7.5vw,56px);line-height:1.06;font-weight:800;letter-spacing:-.03em;margin:.2em 0 .5em;border:none;padding:0;}
.ppt .calls{display:flex;flex-direction:column;gap:10px;}
.ppt .call{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;font-size:clamp(18px,3.4vw,25px);}
.ppt .call .lbl{font-size:14px;font-weight:800;flex:0 0 auto;padding:3px 10px;border-radius:999px;}
.ppt .call.buy .lbl{background:color-mix(in srgb,var(--buy) 15%,transparent);color:var(--buy);}
.ppt .call.sell .lbl{background:color-mix(in srgb,var(--sell) 15%,transparent);color:var(--sell);}
.ppt .call.buy b{color:var(--buy);} .ppt .call.sell b{color:var(--sell);}
.ppt .call b{font-weight:800;letter-spacing:-.01em;}
.ppt .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.ppt .stat{border:1px solid var(--line);border-radius:13px;padding:16px 16px;background:color-mix(in srgb,var(--bg) 45%,var(--card));}
.ppt .stat .k{font-size:12.5px;color:var(--muted);}
.ppt .stat .v{font-size:clamp(22px,3.4vw,30px);font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1.2;}
.ppt .stat .d{font-size:13.5px;font-weight:800;}
.ppt .stat.up .d{color:var(--buy);} .ppt .stat.down .d{color:var(--sell);}
.ppt .three{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.ppt .who{border:1px solid var(--line);border-radius:14px;padding:18px 18px;background:color-mix(in srgb,var(--bg) 45%,var(--card));}
.ppt .who.hot{border-color:color-mix(in srgb,var(--buy) 45%,var(--line));}
.ppt .who .tag{font-size:15px;font-weight:800;display:flex;flex-direction:column;gap:2px;margin-bottom:12px;}
.ppt .who .tag span{font-size:12px;font-weight:700;color:var(--muted);}
.ppt .pick{font-size:17px;font-weight:800;letter-spacing:-.01em;margin-bottom:8px;line-height:1.25;}
.ppt .pick.buy{color:var(--buy);} .ppt .pick.hold{color:var(--muted);}
.ppt .who p{font-size:13.5px;line-height:1.55;color:var(--text);margin:0;}
.ppt .accent{border-color:color-mix(in srgb,var(--link) 30%,var(--line));}
.ppt .verdict-list{display:flex;flex-direction:column;gap:14px;}
.ppt .vl{border-radius:13px;padding:16px 18px;}
.ppt .vl.buy{background:color-mix(in srgb,var(--buy) 8%,transparent);border:1px solid color-mix(in srgb,var(--buy) 25%,var(--line));}
.ppt .vl.sell{background:color-mix(in srgb,var(--sell) 8%,transparent);border:1px solid color-mix(in srgb,var(--sell) 25%,var(--line));}
.ppt .vh{font-size:15px;font-weight:800;margin-bottom:8px;}
.ppt .vl.buy .vh{color:var(--buy);} .ppt .vl.sell .vh{color:var(--sell);}
.ppt .vl ul{margin:0;padding-left:0;list-style:none;}
.ppt .vl li{font-size:15.5px;line-height:1.5;padding:5px 0;border-top:1px solid color-mix(in srgb,var(--line) 60%,transparent);}
.ppt .vl li:first-child{border-top:none;}
.ppt .vl li b{font-weight:800;}
.ppt .agree{display:inline-block;font-size:11.5px;font-weight:700;color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:999px;padding:1px 9px;margin-left:6px;white-space:nowrap;}
.ppt .big{align-items:center;text-align:center;min-height:360px;}
.ppt .huge{font-size:clamp(38px,8.5vw,68px);font-weight:800;letter-spacing:-.03em;line-height:1.05;}
.ppt .huge .vs{color:var(--muted);font-weight:600;font-size:.5em;vertical-align:middle;margin:0 .15em;}
.ppt .big .lead{text-align:center;max-width:560px;}
.ppt .go{display:inline-block;margin-top:22px;font-size:15px;font-weight:800;color:#fff;background:var(--link);padding:11px 22px;border-radius:999px;text-decoration:none;}
.ppt .go:hover{opacity:.9;}
/* 접이식 전체 글 */
.full-report{margin:8px auto 0;max-width:860px;border-top:1px dashed var(--line);}
.full-report>summary{cursor:pointer;list-style:none;font-size:14px;font-weight:800;color:var(--link);padding:14px 4px;text-align:center;}
.full-report>summary::-webkit-details-marker{display:none;}
.full-report>summary:hover{opacity:.8;}
.full-report[open]>summary{border-bottom:1px solid var(--line);margin-bottom:14px;}
@media(max-width:640px){
  .ppt .slide{padding:24px 20px;min-height:0;}
  .ppt .grid{grid-template-columns:repeat(2,1fr);}
  .ppt .three{grid-template-columns:1fr;}
}
</style>
